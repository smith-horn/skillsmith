name: Post-Merge Verify

# Runs host-equivalent typecheck + root-vitest config after every push to main,
# catching config drift (e.g. integration-test types, root vitest exclusions)
# that the PR matrix does not exercise.
#
# SMI-4220: This workflow runs natively on ubuntu-latest, not inside Docker.
# ADR-002 (Docker-first) applies to package builds and developer workflows;
# this CI observer runs natively because the runner environment is
# reproducible, and adding Docker would roughly double runtime for a
# non-gating job.
# SMI-4239: npm ci runs install lifecycle scripts so better-sqlite3 and
# onnxruntime-node prebuilt binaries are available. The co-located package
# tests in vitest.config.root-tests.ts load these via new Database() and
# service contexts — without scripts, module-load fails. This matches the
# behavior of ci.yml, batch-transform.yml, and all publish workflows.
# If a new native module enters the dep tree, it must ship prebuilt binaries
# for linux-x64 on Node 22 — otherwise this workflow will fail at module-load.
#
# See docs/internal/implementation/smi-4210-4212-ci-safety-net.md (SMI-4211).
#
# Rollback: rename this file to `post-merge-verify.yml.disabled` or set
# `if: false` on the `verify` job. Close any open auto-issues manually.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'scripts/**'
      - '.claude/**'

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: '22'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Ensure auto-issue labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ci-failure --color B60205 --description "Automated CI failure report" 2>/dev/null || true
          gh label create post-merge-verify --color FBCA04 --description "Post-merge verification observer" 2>/dev/null || true

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (full workspace)
        run: npm run typecheck

      - name: Root vitest config (SMI-3502 runner)
        run: npx vitest run --config vitest.config.root-tests.ts

      - name: File or update auto-issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="Post-merge verify failed on main"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(cat <<EOF
          Post-merge verification failed on \`main\`.

          - Commit: ${{ github.sha }}
          - Run: $RUN_URL
          - Triggered by: @${{ github.actor }}

          This workflow runs host-equivalent typecheck and the root vitest config
          (\`vitest.config.root-tests.ts\`) which are not covered by the PR matrix.
          See \`docs/internal/implementation/smi-4210-4212-ci-safety-net.md\` (SMI-4211).
          EOF
          )
          EXISTING=$(gh issue list \
            --label post-merge-verify \
            --state open \
            --search "$TITLE in:title" \
            --json number \
            --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Commenting on existing issue #$EXISTING"
            gh issue comment "$EXISTING" --body "$BODY"
          else
            echo "Filing new auto-issue"
            gh issue create \
              --title "$TITLE ($RUN_URL)" \
              --body "$BODY" \
              --label ci-failure,post-merge-verify
          fi
