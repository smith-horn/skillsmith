# SMI-4963: Weekly cross-ecosystem coverage report
# Cross-references the skills.sh leaderboard against the prod skills table,
# emails a digest, and files a Linear issue on a quarantine-threshold breach.
#
# Modeled on .github/workflows/ops-report.yml. Runs on ubuntu-latest with no
# Docker dev container: it only curls the coverage-report edge function and
# runs jq / gh / node scripts/linear-api.mjs. No npm ci, no native modules.

name: Weekly Coverage Report

on:
  # NOTE: the schedule trigger is intentionally shipped COMMENTED OUT.
  # A workflow pointing at a not-yet-deployed /functions/v1/coverage-report
  # would 404 on every cron tick and file a spurious ci-alert. A follow-up
  # enable commit uncomments this block once the edge function is confirmed
  # deployed and a workflow_dispatch dry-run has passed.
  # Intended cron: Monday 10:00 UTC, one hour after ops-report (0 9 * * 1).
  # schedule:
  #   - cron: '0 10 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (compute report but do not send email or file Linear)'
        required: false
        default: false
        type: boolean

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}

jobs:
  coverage-report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate Secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Required secrets SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY not configured."
            exit 1
          fi
          echo "Secrets validated"

      - name: Trigger Coverage Report
        id: report
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          BODY="{\"dryRun\": $DRY_RUN}"
          echo "Triggering coverage report with: $BODY"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$SUPABASE_URL/functions/v1/coverage-report")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          PAYLOAD=$(echo "$RESPONSE" | sed '$d')

          echo "Response code: $HTTP_CODE"
          echo "Response: $PAYLOAD"

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "response<<EOF" >> $GITHUB_OUTPUT
          echo "$PAYLOAD" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Coverage report failed with status $HTTP_CODE"
            exit 1
          fi

      - name: File Linear issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE='${{ steps.report.outputs.response }}'
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          BREACHES=$(echo "$RESPONSE" | jq -r '.data.quarantine_threshold_breaches // [] | length')
          GAPS=$(echo "$RESPONSE" | jq -r '.data.true_coverage_gaps // [] | length')
          FLAGGED=$((BREACHES + GAPS))

          if [ "$FLAGGED" -eq 0 ]; then
            echo "No breaches or new coverage gaps - skipping Linear filing."
            exit 0
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run - $FLAGGED publisher(s) flagged but Linear filing skipped."
            exit 0
          fi

          if [ -z "$LINEAR_API_KEY" ]; then
            echo "::error::LINEAR_API_KEY not configured - cannot file the coverage-regression issue."
            exit 1
          fi

          # Stable title prefix; the count tail varies run to run.
          TITLE="Coverage regression: $FLAGGED publisher(s) flagged"

          BREACH_LINES=$(echo "$RESPONSE" | jq -r '.data.quarantine_threshold_breaches // [] | .[] | "- " + .owner + "/" + .repo + ": " + (.quarantined_count|tostring) + "/" + (.prod_row_count|tostring) + " quarantined"')
          GAP_LINES=$(echo "$RESPONSE" | jq -r '.data.true_coverage_gaps // [] | .[] | "- " + .owner + "/" + .repo + " (" + (.license // "no license") + ")"')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          BODY=$(printf 'Weekly coverage-report job (SMI-4963) flagged %s publisher(s).\n\nQuarantine-threshold breaches:\n%s\n\nTrue coverage gaps:\n%s\n\nRun: %s' \
            "$FLAGGED" "${BREACH_LINES:-none}" "${GAP_LINES:-none}" "$RUN_URL")

          # Dedupe: look for an open issue whose title starts with the stable
          # prefix. If one exists, comment on it instead of filing a duplicate.
          EXISTING=$(node scripts/linear-api.mjs list-issues --status "In Progress" --limit 100 2>/dev/null | awk -F'\t' '$3 ~ /^Coverage regression:/ {print $1; exit}')
          if [ -z "$EXISTING" ]; then
            EXISTING=$(node scripts/linear-api.mjs list-issues --status "Todo" --limit 100 2>/dev/null | awk -F'\t' '$3 ~ /^Coverage regression:/ {print $1; exit}')
          fi

          if [ -n "$EXISTING" ]; then
            echo "Existing open coverage-regression issue $EXISTING - commenting instead of filing."
            node scripts/linear-api.mjs add-comment --issue "$EXISTING" --body "$BODY"
            echo "Linear issue updated: $EXISTING"
          else
            echo "Filing new coverage-regression issue under SMI-4963 (Indexer Scale Hardening)."
            node scripts/linear-api.mjs create-issue --title "$TITLE" --description "$BODY" --priority 2 --parent SMI-4963
          fi

      - name: Generate Summary
        if: success()
        run: |
          RESPONSE='${{ steps.report.outputs.response }}'

          COVERAGE=$(echo "$RESPONSE" | jq -r '.data.report.coveragePct // 0')
          REPOS=$(echo "$RESPONSE" | jq -r '.data.report.leaderboardRepoCount // 0')
          GAPS=$(echo "$RESPONSE" | jq -r '.data.true_coverage_gaps // [] | length')
          BREACHES=$(echo "$RESPONSE" | jq -r '.data.quarantine_threshold_breaches // [] | length')
          EMAIL_SENT=$(echo "$RESPONSE" | jq -r '.data.emailSent // "N/A (dry run)"')
          COVERAGE_PCT=$(awk "BEGIN { printf \"%d\", $COVERAGE * 100 }")

          echo "### Weekly Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Leaderboard coverage | ${COVERAGE_PCT}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Leaderboard repos | $REPOS |" >> $GITHUB_STEP_SUMMARY
          echo "| True coverage gaps | $GAPS |" >> $GITHUB_STEP_SUMMARY
          echo "| Quarantine breaches | $BREACHES |" >> $GITHUB_STEP_SUMMARY
          echo "| Email sent | $EMAIL_SENT |" >> $GITHUB_STEP_SUMMARY

      - name: Report Failure
        if: failure()
        run: |
          echo "### Coverage Report Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "HTTP Code: ${{ steps.report.outputs.http_code }}" >> $GITHUB_STEP_SUMMARY

      # SMI-3335 pattern: alert on scheduled workflow failure.
      - name: Alert on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "ci-alert" --search "Coverage Report failed" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "Still failing: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            gh issue create --repo "${{ github.repository }}" --title "CI: Coverage Report failed ($(date -u +%Y-%m-%d))" --label "ci-alert" --body "**Workflow**: Coverage Report
          **Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch**: ${{ github.ref_name }}

          This issue was auto-created by SMI-4963. Close when resolved."
          fi
