name: CI

# SMI-3999: Triggers unconditionally on every PR/push. The detect-changes job
# (below) classifies doc-only vs non-doc commits and gates every required-check
# job with `needs: [detect-changes]` + `if: needs.detect-changes.outputs.code == 'true'`
# so that pure doc-only commits emit `skipped -> success` for all 9 ci.yml-defined
# required contexts. This mirrors SMI-3997's fix for docs-only.yml (PR #493) and
# the SMI-3546 `verify-implementation` precedent at ci.yml:122-139.
#
# Previously, workflow-level `paths-ignore` suppressed ci.yml entirely on pure
# doc-only PRs, leaving the 9 contexts *missing* (not skipped) on the commit,
# which yielded mergeStateStatus=BLOCKED. See SMI-3999 root cause analysis.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# SMI-2266: Explicit minimal permissions for all jobs
# Individual jobs may override if they need more access
permissions:
  contents: read

env:
  NODE_VERSION: '22'
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # SMI-3999: Detect whether this commit touches any non-doc file. Every required-check
  # job below gates on `needs.detect-changes.outputs.code == 'true'` so that pure
  # doc-only PRs emit `skipped -> success` for all required contexts (branch-protection
  # accepts skipped-with-success but NOT absent contexts).
  #
  # CRITICAL: uses an INVERTED filter (code-output, not docs-output) so mixed
  # commits (e.g., .md + .ts) correctly classify as code=true. A naive docs-output
  # filter would any-match on the .md and skip CI on mixed PRs. See E5 in plan.
  #
  # Does NOT mirror docs-only.yml's filter — the two are *dual*. docs-only.yml uses
  # any-match (run if any doc touched); ci.yml uses inverted any-match (run if any
  # non-doc touched). Keep the two filters semantically dual, not identical.
  detect-changes:
    name: Detect Doc Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # SMI-2267 + SMI-3997 Finding #5: Scope pull-requests:read to ONLY the job that
    # needs it (matches ci.yml:128-129 verify-implementation pattern). Workflow-level
    # stays contents:read per SMI-2267 hardening.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      # SMI-4530: gate `verify-publish-deps.mjs --ci` to release/version-bump
      # PRs (Option 4 hybrid). Non-version-bump PRs run the same script
      # advisory-mode so workspace-dep drift is still surfaced as a warning,
      # but a stuck npm publish can't blast-radius into N blocked PRs.
      version_files: ${{ steps.filter.outputs.version_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-3999: Pinned to SHA for reproducibility (v4 release). Keep in sync with
      # docs-only.yml and website-build job (ci.yml:1415) — any drift is a bug.
      # To update: check https://github.com/dorny/paths-filter/releases
      - name: Filter non-doc paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          # SMI-3997 Finding #2: Explicit base so push-event behavior does not rely
          # on action defaults. On pull_request, compares HEAD against PR base ref.
          # On push-to-main, falls back to the repository default branch (main).
          base: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}
          # SMI-3999 Revision 2 (Stage 2 Finding M2): Intentionally DOES NOT
          # exclude `docs/internal/**` even though docs-only.yml's symmetric
          # filter does include it. Rationale: docs/internal is a git submodule,
          # so parent-repo PRs touching it actually bump `.gitmodules` (which
          # is NOT excluded -> code='true' -> full CI runs, which is correct —
          # submodule bumps must validate the parent's state). If docs/internal
          # is ever de-submoduled, this filter MUST be updated to add
          # `'!docs/internal/**'` or pure doc PRs touching internal docs will
          # incorrectly trigger full CI. Keep this comment load-bearing.
          filters: |
            code:
              - '**'
              - '!.claude/development/**'
              - '!.claude/templates/**'
              - '!**/*.md'
              - '!LICENSE'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/CODEOWNERS'
            version_files:
              - 'packages/*/package.json'
              - 'package-lock.json'

      # SMI-3997 Finding #2: Observability — log the resolved output so the first
      # few carrier runs can be inspected in job logs without cross-referencing
      # the GitHub Checks API.
      - name: Log detection result
        run: |
          echo "Detected code=${{ steps.filter.outputs.code }}"
          echo "Detected version_files=${{ steps.filter.outputs.version_files }}"

  # Secret scanning with gitleaks - runs first, fast, no dependencies
  # Uses CLI directly (free) instead of gitleaks-action (requires paid license for orgs)
  secret-scan:
    name: Secret Scan
    # SMI-3999: Gate on detect-changes. On pure-doc PRs, docs-only.yml's secret-scan
    # already runs and emits a Secret Scan check — this one skips with success.
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Full history for scanning all commits in PR

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Scan only commits in PR
            gitleaks detect --source . --config .gitleaks.toml --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --verbose
          else
            # Scan entire repo for push events
            gitleaks detect --source . --config .gitleaks.toml --verbose
          fi

  # SMI-2187: Classify changes to determine which jobs to run
  # SMI-2190/2191: Detect affected packages for matrix-based testing
  # Outputs tier (docs/config/deps/code), skip flags, and affected packages
  classify:
    name: Classify Changes
    # SMI-3999: Gate on detect-changes. Pure-doc PRs skip — downstream jobs that
    # read classify.outputs will also skip via needs:-chain, which is correct.
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tier: ${{ steps.classify.outputs.tier }}
      skip_docker: ${{ steps.classify.outputs.skip_docker }}
      skip_tests: ${{ steps.classify.outputs.skip_tests }}
      changed_count: ${{ steps.classify.outputs.changed_count }}
      affected_packages: ${{ steps.affected.outputs.affected_packages || '[]' }}
      affected_dirs: ${{ steps.affected.outputs.affected_dirs || '[]' }}
      affected_count: ${{ steps.affected.outputs.affected_count || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install minimatch

      - name: Classify changes
        id: classify
        run: npx tsx scripts/ci/classify-changes.ts

      # SMI-2190: Detect which packages are affected by changes
      - name: Detect affected packages
        id: affected
        if: steps.classify.outputs.tier == 'code' || steps.classify.outputs.tier == 'deps'
        run: |
          # Get changed files from git
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1)
          fi

          # Detect affected packages (outputs written to GITHUB_OUTPUT by script)
          echo "$CHANGED_FILES" | npx tsx scripts/ci/detect-affected.ts > /dev/null

  # SMI-3541: Verify PRs referencing Linear issues contain source code changes
  # Required check since 2026-04-05 (SMI-3546)
  verify-implementation:
    name: Verify Implementation Completeness
    # SMI-3999: Explicitly gate on detect-changes. On pure-doc PRs, classify skips,
    # its outputs.tier is empty, and `tier != 'docs'` would still evaluate true,
    # which would mean this job runs its Node-based verifier on a commit with no
    # code — currently harmless but wasteful. Add explicit detect-changes guard.
    needs: [classify, detect-changes]
    if: |
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.code == 'true' &&
      needs.classify.outputs.tier != 'docs'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npx tsx scripts/ci/verify-implementation.ts --pr-number ${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ github.token }}

  # SMI-3882: Detect code changes that lack corresponding documentation updates
  # Non-blocking during 2-week stabilization (continue-on-error: true)
  doc-drift:
    name: Documentation Drift Check
    needs: [classify]
    if: github.event_name == 'pull_request' && needs.classify.outputs.tier == 'code'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    continue-on-error: true # audit:allow-continue-on-error — stabilization period, not a required check
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npx tsx scripts/ci/check-doc-drift.ts --pr-number ${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ github.token }}

  # SMI-1300: Validate package configurations before expensive Docker build
  # Catches scope mismatches for GitHub Packages early
  # Only runs on upstream repo (smith-horn) - skipped on forks
  package-validation:
    name: Package Validation
    # SMI-3999: Gate on detect-changes.
    needs: [detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.repository_owner == 'smith-horn' &&
      needs.detect-changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-1317: Verify required dependencies are available
      - name: Verify dependencies
        run: |
          if ! command -v jq &> /dev/null; then
            echo "::error::jq is required but not installed"
            exit 1
          fi
          echo "✓ jq is available"

      # SMI-1321: Validate packages directory exists
      - name: Validate packages directory
        run: |
          if [ ! -d packages ] || [ -z "$(ls -A packages 2>/dev/null)" ]; then
            echo "::error::No packages found in packages/ directory"
            exit 1
          fi
          PKG_COUNT=$(ls -d packages/*/package.json 2>/dev/null | wc -l)
          echo "✓ Found $PKG_COUNT packages"

      - name: Validate package configurations
        run: |
          echo "## Package Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Registry | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          FAILED=0

          # Get org name from repository (lowercase for comparison)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "Repository owner: $OWNER"

          for pkg in packages/*/package.json; do
            PKG_NAME=$(jq -r '.name' "$pkg")
            REGISTRY=$(jq -r '.publishConfig.registry // empty' "$pkg")

            # Check if publishing to GitHub Packages
            if [[ "$REGISTRY" == *"npm.pkg.github.com"* ]]; then
              SCOPE=$(echo "$PKG_NAME" | cut -d'/' -f1 | tr -d '@' | tr '[:upper:]' '[:lower:]')

              if [[ "$SCOPE" != "$OWNER" ]]; then
                echo "::error file=$pkg::Package scope '@$SCOPE' doesn't match org '$OWNER' for GitHub Packages"
                echo "| $PKG_NAME | GitHub Packages | ❌ Scope mismatch: @$SCOPE != @$OWNER |" >> $GITHUB_STEP_SUMMARY
                FAILED=1
              else
                echo "✓ $pkg: scope @$SCOPE matches org"
                echo "| $PKG_NAME | GitHub Packages | ✅ Valid |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "✓ $pkg: using npmjs.org registry"
              echo "| $PKG_NAME | npmjs.org | ✅ Valid |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "::error::Package scope validation failed. GitHub Packages requires scope to match org name."
            echo "See: https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-npm-registry"
            exit 1
          fi

          echo ""
          echo "All package configurations valid!"

      # SMI-3471: Verify workspace dependency versions are consistent
      # Catches: exact-pinned deps, version drift, unpublished dep versions
      - name: Verify workspace dependency versions
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # SMI-4530: Hybrid scoping (Option 4). The `--ci` flag makes Check 3
      # ("workspace pin must already exist on npm") a hard fail. That check
      # is load-bearing on release/version-bump PRs, where shipping an
      # unpublished workspace pin would tank the release. On non-version-bump
      # PRs the same check turned a single stuck `publish.yml` run into a
      # cascade that blocked every open code PR (see PR #824 / SMI-4530).
      # Hybrid: required when version files changed, advisory otherwise. The
      # advisory branch still runs the script (warnings printed, exit 0) so
      # genuine drift surfaces without blast radius.
      - name: Audit workspace dependency versions (strict — version-bump PR)
        if: needs.detect-changes.outputs.version_files == 'true'
        run: node scripts/verify-publish-deps.mjs --ci

      - name: Audit workspace dependency versions (advisory — non-version-bump PR)
        if: needs.detect-changes.outputs.version_files != 'true'
        continue-on-error: true # audit:allow-continue-on-error — SMI-4530 hybrid: advisory branch on non-version-bump PRs is intentionally non-blocking; warnings surface in logs but don't block merge.
        run: |
          echo "::notice::SMI-4530 hybrid mode — running verify-publish-deps without --ci."
          echo "::notice::Findings here are advisory. They become required on PRs that touch packages/*/package.json."
          node scripts/verify-publish-deps.mjs || echo "::warning::verify-publish-deps reported issues (advisory on non-version-bump PRs)"

  # SMI-3985: Supply-chain pin drift guard for the three Wave 1 hardening
  # surfaces that are NOT covered by `Standards Compliance` (audit-standards
  # Check 12, packages/*/package.json only) or `Security Audit` (npm audit):
  #   A. GitHub-native license + OpenSSF scorecard review (pull_request only)
  #   B. Deterministic drift guard: .mcp.json @latest, esm.sh semver pins,
  #      third-party GH Actions SHA pins
  # Lands as non-required; promote to required after calibration (see
  # docs/internal/implementation/supply-chain-hardening.md §Wave 1.5).
  dependency-guard:
    name: Dependency Guard
    needs: [classify]
    if: |
      needs.classify.outputs.tier == 'deps' ||
      needs.classify.outputs.tier == 'code' ||
      needs.classify.outputs.tier == 'config'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # SMI-2159: supabase/functions/** is git-crypt encrypted. Fork PRs do
      # not receive secrets.GIT_CRYPT_KEY; the drift script below detects the
      # GITCRYPT magic header and emits a coverage-skipped warning (not a
      # failure) when unlock did not run. Pattern copied from ci.yml:662-672.
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      # A. GitHub-native dependency review — license + OpenSSF scorecard.
      #    Complements (does NOT duplicate) the existing `Security Audit` job
      #    which already runs `npm audit --audit-level=high --omit=dev`.
      #    The action only runs on pull_request events; the drift guard below
      #    still runs on push-to-main.
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

      # B. Drift guard for the three Wave 1 hardened surfaces NOT covered by
      #    `Standards Compliance` / `Security Audit`: esm.sh CDN imports,
      #    .mcp.json @latest tags, third-party GH Actions SHA pins.
      #    audit-standards.mjs Check 12 already runs in the `Standards
      #    Compliance` job (ci.yml:1276) — do NOT call it again here.
      - name: Supply-chain drift guard
        run: node scripts/ci/check-supply-chain-pins.mjs

  # SMI-1903: Validate Edge Function structure and configuration
  # Ensures all functions have proper structure and are categorized
  edge-function-validation:
    name: Edge Function Validation
    # SMI-3999: Gate on detect-changes.
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate Edge Functions
        run: ./scripts/validate-edge-functions.sh

      - name: Generate validation report
        if: always()
        run: |
          echo "## Edge Function Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FUNCTION_COUNT=$(ls -d supabase/functions/*/ 2>/dev/null | grep -v "_shared" | wc -l | tr -d ' ')
          echo "Found **$FUNCTION_COUNT** Edge Functions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Function | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          for fn in supabase/functions/*/; do
            fn_name=$(basename "$fn")
            if [[ "$fn_name" != _* ]]; then
              if [ -f "$fn/index.ts" ]; then
                echo "| $fn_name | ✅ Valid |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $fn_name | ❌ Missing index.ts |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

  # SMI-4459: Pre-ship validation for the post-deploy smoke harness.
  # Runs on every code PR. Asserts:
  #   - bash -n on smoke-prod.sh + per-surface scripts (syntax)
  #   - shellcheck (lint; same -S warning level as validate-hooks.yml)
  #   - --dry-run resolves surfaces from a synthetic changed-file set
  #   - --surface=health canary against real prod (~1s; proves wiring end-to-end)
  # The harness itself runs post-deploy via .github/workflows/smoke-prod.yml.
  smoke-prod-validation:
    name: Smoke Prod Validation
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: bash -n syntax check
        run: |
          bash -n scripts/smoke-prod.sh
          for f in scripts/smoke-prod/*.sh; do bash -n "$f"; done

      - name: shellcheck
        run: |
          # -S warning matches validate-hooks.yml convention; SC1091 (can't
          # follow source) is unavoidable for sourced lib.sh.
          shellcheck -S warning \
            scripts/smoke-prod.sh \
            scripts/smoke-prod/lib.sh \
            scripts/smoke-prod/website.sh \
            scripts/smoke-prod/cli.sh \
            scripts/smoke-prod/mcp-server.sh \
            scripts/smoke-prod/alert.sh

      - name: surfaces.json valid JSON
        run: |
          jq empty scripts/smoke-prod/surfaces.json
          jq -e '.surfaces | length > 0' scripts/smoke-prod/surfaces.json

      - name: --dry-run resolves canary
        run: |
          set -euo pipefail
          OUT=$(SMOKE_CHANGED_FILES="docs/foo.md" ./scripts/smoke-prod.sh --dry-run --json)
          echo "$OUT" | jq -e '.matched_surfaces | index("health")' >/dev/null

      - name: --surface=health canary against prod
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          # Skip if SUPABASE_URL secret is unavailable (forks). The harness
          # exits 1 with a clear message in that case; in-tree PRs always
          # have it.
          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "::warning::SUPABASE_URL not available — skipping prod canary (likely a fork)"
            exit 0
          fi
          ./scripts/smoke-prod.sh --surface=health --json

  # SMI-2595: Validate migration SQL for common issues
  # Catches type mismatches, missing search_path, pg_safeupdate violations
  # Only runs when migration files are changed
  migration-lint:
    name: Migration Lint
    needs: [classify]
    if: |
      !cancelled() &&
      needs.classify.result == 'success' &&
      needs.classify.outputs.tier == 'code'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for migration changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'supabase/migrations/*.sql')
          else
            CHANGED=$(git diff --name-only HEAD~1 -- 'supabase/migrations/*.sql')
          fi

          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No migration files changed — skipping lint"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Migration files changed:"
            echo "$CHANGED"
          fi

      - name: Lint migration SQL
        if: steps.check.outputs.skip != 'true'
        run: |
          ERRORS=0

          echo "## Migration Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for file in supabase/migrations/*.sql; do
            [ -f "$file" ] || continue
            BASENAME=$(basename "$file")
            FILE_ERRORS=0

            # Skip encrypted files (git-crypt)
            if head -c 9 "$file" | grep -q "GITCRYPT"; then
              continue
            fi

            # Check: GET DIAGNOSTICS with boolean variable (should be integer)
            if grep -Pn 'DECLARE\s+\w+\s+boolean' "$file" | grep -q .; then
              if grep -q 'GET DIAGNOSTICS' "$file"; then
                echo "::error file=$file::GET DIAGNOSTICS ROW_COUNT returns integer, not boolean. Use 'integer' type."
                FILE_ERRORS=$((FILE_ERRORS + 1))
              fi
            fi

            # Check: CREATE FUNCTION without SET search_path
            if grep -q 'CREATE.*FUNCTION' "$file"; then
              if ! grep -q 'search_path' "$file"; then
                echo "::warning file=$file::Function missing SET search_path (security best practice)"
              fi
            fi

            # Check: UPDATE/DELETE without WHERE (pg_safeupdate)
            if grep -Pn '^\s*(UPDATE|DELETE)\s' "$file" | grep -v 'WHERE' | grep -q .; then
              echo "::error file=$file::UPDATE/DELETE without WHERE clause violates pg_safeupdate"
              FILE_ERRORS=$((FILE_ERRORS + 1))
            fi

            # Check: GRANT EXECUTE without parameter signature
            if grep -Pn 'GRANT EXECUTE ON FUNCTION\s+\S+\s*;' "$file" | grep -v '(' | grep -q .; then
              echo "::warning file=$file::GRANT EXECUTE should include parameter signature to avoid ambiguity"
            fi

            ERRORS=$((ERRORS + FILE_ERRORS))

            if [ $FILE_ERRORS -eq 0 ]; then
              echo "| $BASENAME | ✅ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $BASENAME | ❌ $FILE_ERRORS error(s) |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "::error::Migration lint found $ERRORS error(s)"
            exit 1
          fi

          echo ""
          echo "All migrations passed lint checks"

  # Build Docker image once, extract dependencies, use for all jobs
  # SMI-708: Optimized to extract node_modules once instead of running npm ci per job
  #
  # Caching Strategy (SMI-2193, SMI-2194):
  # 1. Docker Image Cache: Key = Dockerfile + lockfile + .dockerignore
  #    - Cache hit: Load pre-built image (~30s) instead of rebuild (~6min)
  #    - Cache miss: Full build with GHA layer caching
  # 2. Package Build Cache: Key = source files + tsconfig
  #    - Extracts dist/ directories for potential reuse
  #    - Benefits future runs when only non-code files change
  docker-build:
    needs: [secret-scan, package-validation, classify, detect-changes]
    # SMI-3999: Added detect-changes gate. On pure-doc PRs this skips with success;
    # e2e-tests.yml separately emits its own `Build Docker Image` check, so branch
    # protection is satisfied by the e2e run. On non-doc PRs, behavior unchanged.
    # The previous `needs.secret-scan.result == 'success'` guard is preserved but
    # now also tolerates `skipped` (both upstream jobs skip together on pure-doc PRs).
    if: |
      !cancelled() &&
      needs.detect-changes.outputs.code == 'true' &&
      needs.classify.outputs.skip_docker != 'true' &&
      (needs.secret-scan.result == 'success' || needs.secret-scan.result == 'skipped') &&
      (needs.package-validation.result == 'success' || needs.package-validation.result == 'skipped')
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      docker-cache-hit: ${{ steps.docker-image-cache.outputs.cache-hit }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files before Docker build
      # Narrowed scope (SMI-2604): .claude/skills/**, .claude/plans/**, .claude/hive-mind/**,
      # supabase/functions/**, supabase/migrations/** (docs moved to private submodule)
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          # Decode and write key file
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          # Unlock repository
          git-crypt unlock /tmp/git-crypt-key
          # Clean up key file
          rm -f /tmp/git-crypt-key
          echo "✓ git-crypt unlocked successfully"

      # SMI-2194: Cache Docker image to skip rebuild when only TS source changes
      # Key includes: Dockerfile, lockfile, .dockerignore, and Node version
      # NOTE: No restore-keys - we only want exact matches to avoid loading stale images
      - name: Restore Docker image from cache
        id: docker-image-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: /tmp/docker-cache
          # SMI-4646: cache key suffixed with -zstd to invalidate previous gzip-based cache entries.
          # One-time cache-miss on first push to main after merge; auto-recovered next push (SMI-3653 main-only write rule).
          key: docker-image-${{ hashFiles('Dockerfile', 'package-lock.json', '.dockerignore', '.nvmrc') }}-v${{ env.NODE_VERSION }}-zstd

      # SMI-2194: Load cached Docker image if available
      # SMI-4646: zstd-compressed tarball (.tar.zst) for ~50% faster load vs gzip on cache-hit path
      - name: Load cached Docker image
        id: load-cached-image
        if: steps.docker-image-cache.outputs.cache-hit == 'true'
        run: |
          echo "Loading Docker image from cache..."
          if [ -f /tmp/docker-cache/skillsmith-ci.tar.zst ]; then
            zstd -d --stdout /tmp/docker-cache/skillsmith-ci.tar.zst | docker load
            # Re-tag with current SHA for downstream jobs
            CACHED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
            if [ -n "$CACHED_TAG" ] && [ "$CACHED_TAG" != "${{ github.sha }}" ]; then
              docker tag skillsmith-ci:$CACHED_TAG skillsmith-ci:${{ github.sha }}
            fi
            echo "✓ Docker image loaded from cache (zstd)"
            echo "loaded=true" >> $GITHUB_OUTPUT
          else
            echo "Cache hit but no image file found, will rebuild"
            echo "loaded=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.docker-image-cache.outputs.cache-hit != 'true' || steps.load-cached-image.outputs.loaded != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: skillsmith-ci
          tags: |
            type=sha,prefix=

      # Cache write: main only (SMI-3653)
      # PR branches read from main's cache via cache-from but don't write blobs.
      # This prevents per-PR blob accumulation that fills the 10 GB GHA cache limit.
      # See docs/internal/implementation/ci-cache-pressure-fix.md
      - name: Set BuildKit cache-to
        if: steps.docker-image-cache.outputs.cache-hit != 'true' || steps.load-cached-image.outputs.loaded != 'true'
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "CACHE_TO=type=gha,mode=min,scope=ci" >> $GITHUB_ENV
          fi

      # SMI-2194: Only build if cache miss or load failed
      - name: Build and cache Docker image
        if: steps.docker-image-cache.outputs.cache-hit != 'true' || steps.load-cached-image.outputs.loaded != 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: false
          load: true
          tags: skillsmith-ci:${{ github.sha }}
          cache-from: type=gha,scope=ci
          cache-to: ${{ env.CACHE_TO }}
          target: dev

      # SMI-2194: Save image to cache directory for future runs
      # SMI-4646: zstd -T0 -3 (parallel, level 3) is ~3x faster than gzip with similar ratio
      - name: Save Docker image to cache
        if: steps.docker-image-cache.outputs.cache-hit != 'true' || steps.load-cached-image.outputs.loaded != 'true'
        run: |
          mkdir -p /tmp/docker-cache
          docker save skillsmith-ci:${{ github.sha }} | zstd -T0 -3 > /tmp/docker-cache/skillsmith-ci.tar.zst
          echo "✓ Docker image saved to cache (zstd)"

      # SMI-2240: Always save the re-tagged image from memory, not the cached tarball
      # The cached tarball contains the OLD commit SHA tag, causing downstream jobs to fail
      # with "pull access denied" when they try to run with the current SHA
      # SMI-4646: on cache-hit + load-success, copy from cache (no re-save). Otherwise save fresh.
      # Critical: gate on `loaded == 'true'`, not just `cache-hit` — `cache-hit` true with `loaded` false
      # means the tarball file was missing or load failed; in that case we must re-save fresh.
      - name: Save Docker image for artifact
        run: |
          if [ "${{ steps.load-cached-image.outputs.loaded }}" = "true" ]; then
            cp /tmp/docker-cache/skillsmith-ci.tar.zst /tmp/skillsmith-ci.tar.zst
            echo "✓ Reused cached image tarball (no re-save needed)"
          else
            docker save skillsmith-ci:${{ github.sha }} | zstd -T0 -3 > /tmp/skillsmith-ci.tar.zst
            echo "✓ Saved image with tag: ${{ github.sha }}"
          fi

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: docker-image
          path: /tmp/skillsmith-ci.tar.zst
          retention-days: 1

      # SMI-3539: Surface cache status to PR authors via Step Summary
      - name: Cache status summary
        if: always()
        run: |
          if [ "${{ steps.docker-image-cache.outputs.cache-hit }}" = "true" ]; then
            echo "### Docker Build: Cache Hit" >> $GITHUB_STEP_SUMMARY
            echo "Loaded pre-built image from cache." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Docker Build: Cache Miss — Full Rebuild" >> $GITHUB_STEP_SUMMARY
            echo "No cached image found. Full Docker build with native module compilation (~15 min)." >> $GITHUB_STEP_SUMMARY
            echo "This is expected after lockfile, Dockerfile, or .nvmrc changes." >> $GITHUB_STEP_SUMMARY
          fi

      # SMI-708 + SMI-2193 + SMI-4646: Single extract container ("extract-all") replaces the
      # previous extract-deps + extract-builds split. One `docker create` + `docker rm` saves
      # ~10-15s on each cache-hit run vs spinning up two containers. Extracts:
      #   - root + per-package node_modules (was extract-deps)
      #   - per-package dist/ + website .astro + .turbo caches (was extract-builds)
      # SMI-2159: nested workspace node_modules required for non-hoisted deps like @aws-sdk
      - name: Extract artifacts from Docker image
        run: |
          # Cleanup any leftover containers from previous failed runs
          docker rm -f extract-all 2>/dev/null || true

          # Create a single container (not running) for all docker cp operations
          docker create --name extract-all skillsmith-ci:${{ github.sha }}

          # === node_modules (root + per-package) ===
          docker cp extract-all:/app/node_modules /tmp/node_modules

          for pkg in core mcp-server cli enterprise vscode-extension website doc-retrieval-mcp; do
            mkdir -p /tmp/packages/$pkg
            if docker cp extract-all:/app/packages/$pkg/node_modules /tmp/packages/$pkg/ 2>/dev/null; then
              echo "✓ Copied packages/$pkg/node_modules"
              ls /tmp/packages/$pkg/node_modules/ 2>/dev/null | head -5 || true
            else
              echo "- No node_modules in packages/$pkg (hoisted or doesn't exist)"
            fi
          done

          # === dist/ directories (per-package) + website .astro ===
          for pkg in core mcp-server cli enterprise vscode-extension website doc-retrieval-mcp; do
            mkdir -p packages/$pkg
            if docker cp extract-all:/app/packages/$pkg/dist packages/$pkg/ 2>/dev/null; then
              echo "✓ Extracted packages/$pkg/dist"
              ls packages/$pkg/dist/ 2>/dev/null | head -3 || true
            else
              echo "- No dist in packages/$pkg"
            fi
          done

          mkdir -p packages/website
          if docker cp extract-all:/app/packages/website/.astro packages/website/ 2>/dev/null; then
            echo "✓ Extracted packages/website/.astro"
          else
            echo "- No .astro cache in packages/website"
          fi

          # === SMI-2198: Turbo caches (root + per-package) ===
          if docker cp extract-all:/app/.turbo ./ 2>/dev/null; then
            echo "✓ Extracted root .turbo cache"
          fi
          for pkg in core mcp-server cli enterprise vscode-extension website doc-retrieval-mcp; do
            if docker cp extract-all:/app/packages/$pkg/.turbo packages/$pkg/ 2>/dev/null; then
              echo "✓ Extracted packages/$pkg/.turbo"
            fi
          done

          docker rm extract-all

          # SMI-4646: zstd -T0 -1 (parallel, fastest level) is ~3-4x faster than gzip with similar ratio
          tar -cf - -C /tmp node_modules packages | zstd -T0 -1 > /tmp/node_modules.tar.zst

          echo "=== Tar contents (packages only) ==="
          zstd -d --stdout /tmp/node_modules.tar.zst | tar -tf - | grep "^packages/" | head -20

          echo "=== Extracted package builds ==="
          du -sh packages/*/dist 2>/dev/null || true
          echo "=== Turbo cache ==="
          du -sh .turbo packages/*/.turbo 2>/dev/null || echo "No turbo cache yet"

      - name: Upload node_modules artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: node-modules
          path: /tmp/node_modules.tar.zst
          retention-days: 1
          compression-level: 1 # Minimal - content already zstd-compressed

      # SMI-2193: Cache package build outputs (dist/ directories)
      # SMI-2198: Also cache Turbo's .turbo directory for faster hash computation
      # Key includes: package source files, tsconfig, and lockfile
      # This allows downstream jobs to skip rebuilding unchanged packages
      - name: Cache package builds and Turbo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            packages/core/dist
            packages/mcp-server/dist
            packages/cli/dist
            packages/enterprise/dist
            packages/vscode-extension/dist
            packages/doc-retrieval-mcp/dist
            packages/website/.astro
            .turbo
            packages/*/.turbo
          key: pkg-builds-turbo-${{ hashFiles('packages/*/src/**/*.ts', 'packages/*/src/**/*.tsx', 'packages/*/package.json', 'tsconfig*.json', 'turbo.json') }}
          restore-keys: |
            pkg-builds-turbo-

      # NOTE: Package builds are cached via the "Cache package builds and Turbo" step above
      # for future runs, not uploaded as artifact. The cache provides cross-run benefits
      # without the per-run upload overhead (~30-60s).

  # Parallel quality checks using Docker container
  # SMI-708: All jobs now use pre-extracted node_modules instead of npm ci
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker-build, classify, detect-changes]
    # SMI-3999: Explicit detect-changes gate for clarity. Chain-skip would also work
    # (docker-build skips -> lint skips) but explicit gate makes intent reviewable.
    # Skip lint if classifier determines no code changes
    if: |
      needs.detect-changes.outputs.code == 'true' &&
      needs.classify.outputs.skip_tests != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download-docker
        continue-on-error: true
        with:
          name: docker-image
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download-modules
        continue-on-error: true # audit:allow-continue-on-error — best-effort cache; falls back to npm install
        with:
          name: node-modules
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected (cache hit scenario)
      - name: Load Docker image
        id: load-image
        if: steps.download-docker.outcome == 'success'
        continue-on-error: true
        run: |
          zstd -d --stdout /tmp/skillsmith-ci.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-ci --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-ci:$LOADED_TAG skillsmith-ci:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      # SMI-2240: Fallback to native npm ci when Docker unavailable
      - name: Setup Node.js (fallback)
        if: steps.load-image.outcome != 'success'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (fallback)
        if: steps.load-image.outcome != 'success'
        run: npm ci

      - name: Extract node_modules
        if: steps.load-image.outcome == 'success'
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Run ESLint (Docker)
        if: steps.load-image.outcome == 'success'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm run lint

      - name: Run ESLint (fallback)
        if: steps.load-image.outcome != 'success'
        run: npm run lint

      - name: Check formatting (Docker)
        if: steps.load-image.outcome == 'success'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm run format:check

      - name: Check formatting (fallback)
        if: steps.load-image.outcome != 'success'
        run: npm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker-build, classify, detect-changes]
    # SMI-3999: Explicit detect-changes gate for clarity.
    # Skip typecheck if classifier determines no code changes
    if: |
      needs.detect-changes.outputs.code == 'true' &&
      needs.classify.outputs.skip_tests != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download-docker
        continue-on-error: true
        with:
          name: docker-image
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download-modules
        continue-on-error: true # audit:allow-continue-on-error — best-effort cache; falls back to npm install
        with:
          name: node-modules
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected (cache hit scenario)
      - name: Load Docker image
        id: load-image
        if: steps.download-docker.outcome == 'success'
        continue-on-error: true
        run: |
          zstd -d --stdout /tmp/skillsmith-ci.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-ci --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-ci:$LOADED_TAG skillsmith-ci:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      # SMI-2240: Fallback to native npm ci when Docker unavailable
      - name: Setup Node.js (fallback)
        if: steps.load-image.outcome != 'success'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (fallback)
        if: steps.load-image.outcome != 'success'
        run: npm ci

      - name: Extract node_modules
        if: steps.load-image.outcome == 'success'
        run: |
          # Extract to workspace - tar will merge with existing packages/ directory
          zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

          # Verify AWS SDK was extracted for enterprise package (required for typecheck)
          echo "=== Verifying nested node_modules extraction ==="
          if [ -d "${{ github.workspace }}/packages/enterprise/node_modules/@aws-sdk" ]; then
            echo "✓ AWS SDK found in packages/enterprise/node_modules"
            ls ${{ github.workspace }}/packages/enterprise/node_modules/@aws-sdk/ | head -5
          else
            echo "✗ AWS SDK NOT found - checking what happened"
            echo "Contents of packages/enterprise/:"
            ls -la ${{ github.workspace }}/packages/enterprise/ || true
            echo "Checking tar contents:"
            zstd -d --stdout /tmp/node_modules.tar.zst | tar -tf - | grep "enterprise" | head -10 || echo "No enterprise in tar"
          fi

      - name: Run TypeScript type check (Docker)
        if: steps.load-image.outcome == 'success'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm run typecheck

      - name: Run TypeScript type check (fallback)
        if: steps.load-image.outcome != 'success'
        run: npm run typecheck

  # SMI-2192: Matrix-based test execution for affected packages
  # Runs tests in parallel per package, only for packages affected by changes
  # When affected_dirs is empty (docs-only), this job is skipped entirely
  test:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker-build, classify]
    # Skip tests if classifier determines no code changes OR no affected packages
    if: |
      needs.classify.outputs.skip_tests != 'true' &&
      needs.classify.outputs.affected_count != '0'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.classify.outputs.affected_dirs) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download-docker
        continue-on-error: true
        with:
          name: docker-image
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download-modules
        continue-on-error: true # audit:allow-continue-on-error — best-effort cache; falls back to npm install
        with:
          name: node-modules
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected (cache hit scenario)
      - name: Load Docker image
        id: load-image
        if: steps.download-docker.outcome == 'success'
        continue-on-error: true
        run: |
          zstd -d --stdout /tmp/skillsmith-ci.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-ci --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-ci:$LOADED_TAG skillsmith-ci:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      # SMI-2240: Fallback to native npm ci when Docker unavailable
      - name: Setup Node.js (fallback)
        if: steps.load-image.outcome != 'success'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (fallback)
        if: steps.load-image.outcome != 'success'
        run: npm ci

      - name: Extract node_modules
        if: steps.load-image.outcome == 'success'
        run: |
          # Extract to workspace - tar will merge with existing packages/ directory
          zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

          # Verify AWS SDK was extracted for enterprise package
          echo "=== Verifying nested node_modules extraction ==="
          if [ -d "${{ github.workspace }}/packages/enterprise/node_modules/@aws-sdk" ]; then
            echo "✓ AWS SDK found in packages/enterprise/node_modules"
            ls ${{ github.workspace }}/packages/enterprise/node_modules/@aws-sdk/ | head -5
          else
            echo "✗ AWS SDK NOT found in packages/enterprise/node_modules"
          fi

      - name: Build project (Docker)
        if: steps.load-image.outcome == 'success'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm run build

      - name: Build project (fallback)
        if: steps.load-image.outcome != 'success'
        run: npm run build

      # SMI-2250: Remove local vitest if present to ensure hoisted version is used
      - name: Clean local vitest (website workaround)
        if: matrix.package == 'website'
        run: |
          rm -rf packages/website/node_modules/vitest packages/website/node_modules/vite-node
          echo "✓ Removed local vitest/vite-node from website package"

      - name: Run tests for ${{ matrix.package }} (Docker)
        if: steps.load-image.outcome == 'success'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm test --workspace=packages/${{ matrix.package }}

      - name: Run tests for ${{ matrix.package }} (fallback)
        if: steps.load-image.outcome != 'success'
        run: npm test --workspace=packages/${{ matrix.package }}

      - name: Generate coverage for ${{ matrix.package }} (Docker)
        if: steps.load-image.outcome == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm run test:coverage --workspace=packages/${{ matrix.package }} || true

      - name: Generate coverage for ${{ matrix.package }} (fallback)
        if: steps.load-image.outcome != 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run test:coverage --workspace=packages/${{ matrix.package }} || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: ./packages/${{ matrix.package }}/coverage/coverage-final.json
          flags: ${{ matrix.package }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Run root-level tests (scripts/tests, supabase/functions) when affected
  # These tests don't belong to any package but need to run
  test-root:
    name: Test (root)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker-build, classify]
    # Run when code/deps tier and changes include non-package files
    if: |
      needs.classify.outputs.skip_tests != 'true' &&
      (needs.classify.outputs.tier == 'code' || needs.classify.outputs.tier == 'deps')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2250: Decrypt git-crypt encrypted files (supabase/functions tests are encrypted)
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      # Note: No npm ci fallback for test-root - these tests require Docker environment
      # for consistent behavior with root-level scripts and supabase functions
      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-modules
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected (cache hit scenario)
      - name: Load Docker image
        run: |
          zstd -d --stdout /tmp/skillsmith-ci.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-ci --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-ci:$LOADED_TAG skillsmith-ci:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      - name: Extract node_modules
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Build project
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm run build

      # SMI-4652: scripts/tests + supabase/functions only (positional globs
      # match historical behavior). Colocated `packages/*/src/**/*.test.ts`
      # tests are covered by the parallel `Test (root colocated)` job below
      # via `vitest.config.colocated.ts` — they were originally combined here
      # but a process-level interaction in the runner (MaxListenersExceeded +
      # post-test exit 1) surfaced when both ran in the same vitest invocation.
      # Splitting them sidesteps the interaction and keeps the SMI-3502 OOM
      # mitigation intact (each invocation stays under the 7GB ceiling on its
      # own). See plan-review B-4 + Step 4b in the trifecta plan.
      - name: Run root-level tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npx vitest run scripts/tests supabase/functions --passWithNoTests

  # SMI-4652: parallel job covering colocated `packages/*/src/**/*.test.ts`
  # tests that were silently skipped by the original `Test (root)` positional
  # globs. SMI-4549, SMI-4640, and the 2026-05-02 install.test.ts hotfix
  # (#883) all slipped through that gap. Pre-push and post-merge-verify both
  # ran the combined `vitest.config.root-tests.ts` and caught what PR matrix
  # missed; this job closes the gap in PR matrix.
  test-root-colocated:
    name: Test (root colocated)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build, classify]
    # Match `Test (root)` gate exactly so the two jobs ungate/skip together.
    if: |
      needs.classify.outputs.skip_tests != 'true' &&
      (needs.classify.outputs.tier == 'code' || needs.classify.outputs.tier == 'deps')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Note: colocated tests don't read git-crypt content, but unlock matches
      # `Test (root)` so devs see consistent setup across jobs.
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-modules
          path: /tmp

      - name: Load Docker image
        run: |
          zstd -d --stdout /tmp/skillsmith-ci.tar.zst | docker load
          LOADED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            if ! docker tag skillsmith-ci:$LOADED_TAG skillsmith-ci:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      - name: Extract node_modules
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Build project
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm run build

      - name: Run colocated package tests
        run: |
          # SMI-4652: --maxWorkers=2 caps vitest's worker-pool. Default
          # auto-detection spawns >10 workers on the ubuntu-latest runner;
          # each registers a SIGTERM/SIGINT handler on the parent, tripping
          # node's MaxListenersExceededWarning (limit 10) and triggering a
          # cascade signal that exits 1. Tests themselves pass cleanly when
          # parallelism is bounded.
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npx vitest run --config vitest.config.colocated.ts --maxWorkers=2 --passWithNoTests

  # Security audit always runs regardless of change classification.
  # Rationale: Security vulnerabilities can be introduced by any change type,
  # and the audit is relatively fast compared to the cost of missing a vulnerability.
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build, detect-changes]
    # SMI-3999: Explicit detect-changes gate. The docker-build chain-skip already
    # covers this, but explicit is better than implicit for a required check.
    if: needs.detect-changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      # Note: No npm ci fallback for security - audit requires Docker for reproducible results
      # and consistent dependency resolution across environments
      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-modules
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected (cache hit scenario)
      - name: Load Docker image
        run: |
          zstd -d --stdout /tmp/skillsmith-ci.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-ci --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-ci:$LOADED_TAG skillsmith-ci:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      - name: Extract node_modules
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Run dependency audit in Docker
        # Fail on high/critical vulnerabilities in production deps only
        # --omit=dev skips devDependencies (vercel, tsx) with known transitive vulnerabilities
        continue-on-error: true
        id: audit
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm audit --audit-level=high --omit=dev

      - name: Check audit result
        if: steps.audit.outcome == 'failure'
        run: |
          echo "::warning::npm audit found high-severity vulnerabilities. Review the audit output above."

      - name: Fail on high-severity vulnerabilities
        if: steps.audit.outcome == 'failure'
        run: |
          echo "::error::npm audit found high-severity vulnerabilities. See audit output above."
          exit 1

      - name: Build project for security tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm run build

      - name: Run security test suite
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm test -- packages/core/tests/security/

      # SMI-1250: Removed coverage step - global thresholds don't apply to subset tests
      # Security tests run above without coverage; full coverage in main test job

  compliance:
    name: Standards Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker-build, detect-changes]
    # SMI-3999: Explicit detect-changes gate.
    if: needs.detect-changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      # Note: No npm ci fallback for compliance - standards audit requires Docker
      # for consistent tooling versions
      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-modules
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected (cache hit scenario)
      - name: Load Docker image
        run: |
          zstd -d --stdout /tmp/skillsmith-ci.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-ci --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-ci:$LOADED_TAG skillsmith-ci:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      - name: Extract node_modules
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Run standards audit in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm run audit:standards

  # SMI-2116: Website Build Verification
  # Ensures website builds successfully when website files change
  website-build:
    name: Website Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker-build
    # Only run when website files change (PRs only)
    if: github.event_name == 'pull_request'

    steps:
      - name: Check for website changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            website:
              - 'packages/website/**'

      - name: Checkout
        if: steps.changes.outputs.website == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files
      - name: Unlock git-crypt
        if: steps.changes.outputs.website == 'true' && env.GIT_CRYPT_KEY != ''
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      # Note: No npm ci fallback for website-build - Astro build requires consistent
      # Node environment provided by Docker
      - name: Download Docker image
        if: steps.changes.outputs.website == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp

      - name: Download node_modules
        if: steps.changes.outputs.website == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-modules
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected (cache hit scenario)
      # SMI-2247: Non-critical job - warn on re-tag failure instead of failing
      - name: Load Docker image
        if: steps.changes.outputs.website == 'true'
        run: |
          zstd -d --stdout /tmp/skillsmith-ci.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-ci --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-ci:$LOADED_TAG skillsmith-ci:${{ github.sha }}; then
              echo "::warning::Re-tag failed, job will continue with degraded functionality"
            fi
          fi

      - name: Extract node_modules
        if: steps.changes.outputs.website == 'true'
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Build website in Docker
        if: steps.changes.outputs.website == 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app/packages/website \
            skillsmith-ci:${{ github.sha }} \
            npm run build 2>&1 | tee /tmp/astro-build.log

      # SMI-2368: Enforce 0/0/0 baseline (zero errors, warnings, hints)
      # Parse the actual numbers from Astro's "- N errors/warnings/hints" summary
      - name: Check for Astro build warnings and hints
        if: steps.changes.outputs.website == 'true'
        run: |
          BUILD_LOG="/tmp/astro-build.log"
          ERRORS=$(sed -n 's/^- \([0-9]*\) error.*/\1/p' "$BUILD_LOG" | tail -1)
          WARNINGS=$(sed -n 's/^- \([0-9]*\) warning.*/\1/p' "$BUILD_LOG" | tail -1)
          HINTS=$(sed -n 's/^- \([0-9]*\) hint.*/\1/p' "$BUILD_LOG" | tail -1)
          ERRORS=${ERRORS:-0}
          WARNINGS=${WARNINGS:-0}
          HINTS=${HINTS:-0}
          echo "Build quality: $ERRORS errors, $WARNINGS warnings, $HINTS hints"
          if [ "$ERRORS" -gt 0 ] || [ "$WARNINGS" -gt 0 ] || [ "$HINTS" -gt 0 ]; then
            echo "::error::Astro build produced $ERRORS error(s), $WARNINGS warning(s), $HINTS hint(s). The 0/0/0 baseline must be maintained."
            echo ""
            echo "Build log output:"
            grep -iE "error|warning|hint" "$BUILD_LOG" | grep -v "^- 0 " || true
            exit 1
          fi
          echo "Build quality check passed: 0/0/0 baseline maintained"

      - name: Verify dist directory exists
        if: steps.changes.outputs.website == 'true'
        run: |
          if [ ! -d "packages/website/dist" ]; then
            echo "::error::Website build failed - dist/ directory not created"
            exit 1
          fi
          FILE_COUNT=$(find packages/website/dist -type f | wc -l)
          echo "Website build successful: $FILE_COUNT files generated"

      - name: Generate build summary
        if: always()
        run: |
          echo "## Website Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.website }}" != "true" ]; then
            echo "Skipped - no changes to packages/website/**" >> $GITHUB_STEP_SUMMARY
          elif [ -d "packages/website/dist" ]; then
            FILE_COUNT=$(find packages/website/dist -type f | wc -l)
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Status | Build Successful |" >> $GITHUB_STEP_SUMMARY
            echo "| Files Generated | $FILE_COUNT |" >> $GITHUB_STEP_SUMMARY
          else
            echo "Build Failed - dist/ directory not created" >> $GITHUB_STEP_SUMMARY
          fi

  # SMI-1826: Automated Code Review
  # Runs standards audit after lint and test pass, uploads report as artifact
  # SMI-2195: Skip code review for non-code changes (docs, config)
  code-review:
    name: Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test, classify]
    # audit:allow-continue-on-error — non-blocking initially while we stabilize
    continue-on-error: true
    # Only run for code changes - skip for docs/config
    if: needs.classify.outputs.tier == 'code'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Note: No npm ci fallback for code-review - already has continue-on-error: true
      # so failures are non-blocking anyway
      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-modules
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected (cache hit scenario)
      # SMI-2247: Non-critical job - warn on re-tag failure instead of failing
      - name: Load Docker image
        run: |
          zstd -d --stdout /tmp/skillsmith-ci.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-ci --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-ci:$LOADED_TAG skillsmith-ci:${{ github.sha }}; then
              echo "::warning::Re-tag failed, job will continue with degraded functionality"
            fi
          fi

      - name: Extract node_modules
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Run automated code review
        id: code-review
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            bash scripts/ci-code-review.sh audit-report.json

      - name: Upload audit report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: code-review-report
          path: audit-report.json
          retention-days: 7

      - name: Add review summary to job
        if: always()
        run: |
          echo "## Code Review Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f audit-report.json ]; then
            PASSED=$(jq -r '.summary.passed' audit-report.json)
            WARNINGS=$(jq -r '.summary.warnings' audit-report.json)
            FAILED=$(jq -r '.summary.failed' audit-report.json)
            SCORE=$(jq -r '.summary.compliance_score' audit-report.json)
            STATUS=$(jq -r '.status' audit-report.json)

            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Compliance Score | ${SCORE}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | ${PASSED} |" >> $GITHUB_STEP_SUMMARY
            echo "| Warnings | ${WARNINGS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | ${FAILED} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "Audit report not generated" >> $GITHUB_STEP_SUMMARY
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck, test, security, compliance, detect-changes]
    # SMI-3999: Explicit detect-changes gate. The lint/typecheck/security/compliance
    # chain-skip already covers this, but explicit gate makes the required-check
    # contract unambiguous to future readers. The `(test.result == 'skipped')` clause
    # is a DELIBERATE correctness improvement (not neutral replication) that allows
    # build to run when the test matrix is empty (e.g., config-only PRs with no
    # affected packages). Pre-SMI-3999, implicit `success()` gating would cause
    # build to skip whenever test skipped — masked by admin bypass historically.
    # Monitoring requirement (plan Step 3.11): on the first post-merge config-only
    # PR that historically would have skipped build implicitly, verify build runs
    # to completion successfully.
    if: |
      !cancelled() &&
      needs.detect-changes.outputs.code == 'true' &&
      needs.lint.result == 'success' &&
      needs.typecheck.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.security.result == 'success' &&
      needs.compliance.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download-docker
        continue-on-error: true
        with:
          name: docker-image
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download-modules
        continue-on-error: true # audit:allow-continue-on-error — best-effort cache; falls back to npm install
        with:
          name: node-modules
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected (cache hit scenario)
      - name: Load Docker image
        id: load-image
        if: steps.download-docker.outcome == 'success'
        continue-on-error: true
        run: |
          zstd -d --stdout /tmp/skillsmith-ci.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-ci --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-ci:$LOADED_TAG skillsmith-ci:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      # SMI-2240: Fallback to native npm ci when Docker unavailable
      - name: Setup Node.js (fallback)
        if: steps.load-image.outcome != 'success'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (fallback)
        if: steps.load-image.outcome != 'success'
        run: npm ci

      - name: Extract node_modules
        if: steps.load-image.outcome == 'success'
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      # SMI-970: This build is intentional, not a duplicate
      # The Test job builds for test execution, but that output is discarded
      # when the job ends. GitHub Actions jobs have isolated workspaces, so
      # we must rebuild here to generate artifacts for upload.
      - name: Build all packages (Docker)
        if: steps.load-image.outcome == 'success'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm run build

      - name: Build all packages (fallback)
        if: steps.load-image.outcome != 'success'
        run: npm run build

      - name: Copy build artifacts
        run: |
          mkdir -p build-output
          cp -r packages/*/dist build-output/ 2>/dev/null || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: build-output
          path: build-output/
          retention-days: 7

  # SMI-1582, SMI-1609: Fresh Install CI Test
  # Tests that the CLI works correctly when installed fresh
  # This catches packaging issues, missing dependencies, and native module problems
  # Uses local build artifacts (npm pack) to test the current commit, not npm registry
  # SMI-2195: Only run on version bumps or dependency changes to save CI time
  fresh-install-test:
    name: Fresh Install Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, classify]
    # Only run on main/tags AND (release commits OR dependency changes)
    if: |
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) &&
      (contains(github.event.head_commit.message, 'chore(release)') ||
       contains(github.event.head_commit.message, 'chore: release') ||
       needs.classify.outputs.tier == 'deps')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Note: No npm ci fallback for fresh-install-test - this job specifically tests
      # the packaged artifacts, not the development environment
      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-modules
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected (cache hit scenario)
      - name: Load Docker image
        run: |
          zstd -d --stdout /tmp/skillsmith-ci.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-ci --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-ci --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-ci:$LOADED_TAG skillsmith-ci:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      - name: Extract node_modules
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Build packages in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-ci:${{ github.sha }} \
            npm run build

      - name: Create package tarballs
        run: |
          mkdir -p /tmp/packages
          # Create tarballs for each package
          cd packages/core && npm pack --pack-destination /tmp/packages
          cd ../mcp-server && npm pack --pack-destination /tmp/packages
          cd ../cli && npm pack --pack-destination /tmp/packages
          cd ../..
          ls -la /tmp/packages

      - name: Create clean test directory
        run: |
          mkdir -p /tmp/fresh-install-test
          cd /tmp/fresh-install-test
          npm init -y

      - name: Test CLI fresh install from local tarballs
        working-directory: /tmp/fresh-install-test
        run: |
          echo "Testing fresh install from local build..."

          # Install packages in dependency order from local tarballs
          CORE_TAR=$(ls /tmp/packages/skillsmith-core-*.tgz)
          MCP_TAR=$(ls /tmp/packages/skillsmith-mcp-server-*.tgz)
          CLI_TAR=$(ls /tmp/packages/skillsmith-cli-*.tgz)

          echo "Installing core: $CORE_TAR"
          npm install "$CORE_TAR" --save

          echo "Installing mcp-server: $MCP_TAR"
          npm install "$MCP_TAR" --save

          echo "Installing cli: $CLI_TAR"
          npm install "$CLI_TAR" --save-dev

          # Verify the packages installed correctly
          if [ ! -d "node_modules/@skillsmith/cli" ]; then
            echo "::error::CLI package not found in node_modules"
            exit 1
          fi

          echo "✓ Packages installed successfully"

      - name: Test CLI commands
        working-directory: /tmp/fresh-install-test
        run: |
          # Test help command
          npx skillsmith --help || npx sklx --help
          echo "✓ Help command works"

          # Test version command
          npx skillsmith --version || npx sklx --version
          echo "✓ Version command works"

          # Test search command (should work without database)
          npx skillsmith search --help || npx sklx search --help
          echo "✓ Search help works"

      - name: Test native module loading
        working-directory: /tmp/fresh-install-test
        run: |
          # Test that native modules (better-sqlite3) load correctly
          node -e "
            const path = require('path');
            try {
              // Attempt to load the core package which uses native modules
              const cliPath = require.resolve('@skillsmith/cli');
              console.log('CLI resolved to:', cliPath);
              console.log('✓ Native modules load correctly');
            } catch (e) {
              console.error('Failed to load:', e.message);
              if (e.message.includes('NODE_MODULE_VERSION')) {
                console.error('::error::Native module version mismatch - rebuild required');
                process.exit(1);
              }
              if (e.message.includes('GLIBC')) {
                console.error('::error::GLIBC compatibility issue - check Docker base image');
                process.exit(1);
              }
              // Other errors might be acceptable (e.g., optional dependencies)
              console.log('Warning: Non-critical load issue');
            }
          "

      - name: Generate fresh install report
        if: always()
        run: |
          echo "## Fresh Install Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm pack | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| npm install (local) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI --help | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI --version | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Native modules | ✅ |" >> $GITHUB_STEP_SUMMARY
