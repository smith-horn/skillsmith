# SMI-4460 — weekly cleanup of audit_logs rows generated by the device-login
# round-trip e2e test user. Prevents the test user from dominating the staging
# audit-log distribution (~30 PR runs/week + nightly).
#
# Filter: event_type='auth:device_code:consumed' AND metadata->>'user_id'=$E2E_TEST_USER_ID
# AND created_at < now() - interval '7 days'.
#
# IMPORTANT: audit_logs has no user_id column (per CLAUDE.md memory
# `feedback_audit_logs_no_user_id_column.md`). The metadata->>'user_id'
# predicate is required.
#
# Connection (SMI-4937): STAGING_POOLER_URL holds the full staging
# transaction-pooler connection string. Copy it verbatim from the Supabase
# dashboard (Project Settings → Database → Connection Pooler, Transaction mode,
# port 6543) for project ovhcifugwqnzoebwfuku. Do NOT hand-assemble
# host/port/region — the prior hardcoded `aws-0-us-west-1` host never matched
# staging's region and the job failed 0/4 runs with "Tenant or user not found".

name: Device Login Round-Trip — audit_logs cleanup

on:
  schedule:
    - cron: '0 4 * * 0' # Sundays 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  cleanup:
    name: Delete >7-day audit_logs rows for test user
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: e2e-staging
    permissions:
      contents: read
    env:
      STAGING_POOLER_URL: ${{ secrets.STAGING_POOLER_URL }}
      E2E_TEST_USER_ID: ${{ secrets.E2E_TEST_USER_ID }}
    steps:
      - name: Validate connection secret
        run: |
          set -eu
          if [ -z "${STAGING_POOLER_URL:-}" ]; then
            echo "::error::STAGING_POOLER_URL secret is empty or unset — add the staging transaction-pooler connection string to the e2e-staging environment"
            exit 1
          fi
          if [ -z "${E2E_TEST_USER_ID:-}" ]; then
            echo "::error::E2E_TEST_USER_ID secret is empty or unset"
            exit 1
          fi
          # Refuse if the connection string points at the prod project.
          if printf '%s' "$STAGING_POOLER_URL" | grep -q 'vrcnzpmndtroqxxoqkzy'; then
            echo "::error::STAGING_POOLER_URL contains the prod project ref — refusing to run"
            exit 1
          fi

      - name: Delete stale audit_logs rows (metadata->>'user_id')
        run: |
          set -eu
          # NOTE: audit_logs.metadata is jsonb; ->>'user_id' yields text.
          # pg_safeupdate is enforced at the database level, so the WHERE
          # clause is mandatory.
          psql \
            "$STAGING_POOLER_URL" \
            -v ON_ERROR_STOP=1 \
            -P pager=off \
            -c "DELETE FROM audit_logs WHERE event_type = 'auth:device_code:consumed' AND metadata->>'user_id' = '${E2E_TEST_USER_ID}' AND created_at < now() - interval '7 days';"
