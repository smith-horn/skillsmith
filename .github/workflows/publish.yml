# SMI-1251: Aligned with Docker-first CI strategy
# See also: publish-vscode.yml (VS Code Marketplace)
name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        default: 'true'
        type: boolean

# contents:write required for `gh release create` in create-gh-release job (SMI-4191).
# packages:write required for GitHub Packages publishing (@smith-horn/enterprise).
permissions:
  contents: write
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  # SMI-4188: single source of truth for packages this workflow publishes.
  # Validate and publish both derive filters from this list. Website and
  # vscode-extension are published by other workflows or are private.
  # Parity with the inline pre-publish-check enumeration is enforced by
  # scripts/audit-standards.mjs (fails CI on drift).
  PUBLISHABLE_PACKAGES_JSON: '["@skillsmith/core","@skillsmith/mcp-server","@skillsmith/cli","@smith-horn/enterprise"]'

jobs:
  # SMI-1301: Pre-publish validation before expensive Docker build
  # Catches version conflicts and configuration issues early
  pre-publish-check:
    name: Pre-Publish Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      core-exists: ${{ steps.version-check.outputs.core_exists }}
      mcp-exists: ${{ steps.version-check.outputs.mcp_exists }}
      cli-exists: ${{ steps.version-check.outputs.cli_exists }}
      enterprise-exists: ${{ steps.version-check.outputs.enterprise_exists }}
      any-to-publish: ${{ steps.version-check.outputs.any_to_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # SMI-1317: Verify required dependencies are available
      - name: Verify dependencies
        run: |
          if ! command -v jq &> /dev/null; then
            echo "::error::jq is required but not installed"
            exit 1
          fi
          echo "✓ jq is available"

      # SMI-1321: Validate packages directory exists
      - name: Validate packages directory
        run: |
          if [ ! -d packages ] || [ -z "$(ls -A packages 2>/dev/null)" ]; then
            echo "::error::No packages found in packages/ directory"
            exit 1
          fi
          PKG_COUNT=$(ls -d packages/*/package.json 2>/dev/null | wc -l)
          echo "✓ Found $PKG_COUNT packages"

      - name: Check version availability
        id: version-check
        run: |
          echo "## Version Availability Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Local Version | Published | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------------|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          ANY_TO_PUBLISH=false

          # Check @skillsmith/core
          VERSION=$(jq -r .version packages/core/package.json)
          PUBLISHED=$(npm view @skillsmith/core@$VERSION version 2>/dev/null || echo '')
          if [ -n "$PUBLISHED" ]; then
            echo "core_exists=true" >> $GITHUB_OUTPUT
            echo "| @skillsmith/core | $VERSION | $PUBLISHED | ⏭️ Skip |" >> $GITHUB_STEP_SUMMARY
          else
            echo "core_exists=false" >> $GITHUB_OUTPUT
            echo "| @skillsmith/core | $VERSION | - | 📦 Publish |" >> $GITHUB_STEP_SUMMARY
            ANY_TO_PUBLISH=true
          fi

          # Check @skillsmith/mcp-server
          VERSION=$(jq -r .version packages/mcp-server/package.json)
          PUBLISHED=$(npm view @skillsmith/mcp-server@$VERSION version 2>/dev/null || echo '')
          if [ -n "$PUBLISHED" ]; then
            echo "mcp_exists=true" >> $GITHUB_OUTPUT
            echo "| @skillsmith/mcp-server | $VERSION | $PUBLISHED | ⏭️ Skip |" >> $GITHUB_STEP_SUMMARY
          else
            echo "mcp_exists=false" >> $GITHUB_OUTPUT
            echo "| @skillsmith/mcp-server | $VERSION | - | 📦 Publish |" >> $GITHUB_STEP_SUMMARY
            ANY_TO_PUBLISH=true
          fi

          # Check @skillsmith/cli
          VERSION=$(jq -r .version packages/cli/package.json)
          PUBLISHED=$(npm view @skillsmith/cli@$VERSION version 2>/dev/null || echo '')
          if [ -n "$PUBLISHED" ]; then
            echo "cli_exists=true" >> $GITHUB_OUTPUT
            echo "| @skillsmith/cli | $VERSION | $PUBLISHED | ⏭️ Skip |" >> $GITHUB_STEP_SUMMARY
          else
            echo "cli_exists=false" >> $GITHUB_OUTPUT
            echo "| @skillsmith/cli | $VERSION | - | 📦 Publish |" >> $GITHUB_STEP_SUMMARY
            ANY_TO_PUBLISH=true
          fi

          # SMI-1316: Check @smith-horn/enterprise with authenticated GitHub Packages check
          VERSION=$(jq -r .version packages/enterprise/package.json)
          # Configure npm for GitHub Packages auth (using GITHUB_TOKEN)
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          PUBLISHED=$(npm view @smith-horn/enterprise@$VERSION version --registry=https://npm.pkg.github.com 2>/dev/null || echo '')
          # Clean up npmrc
          rm -f ~/.npmrc
          if [ -n "$PUBLISHED" ]; then
            echo "enterprise_exists=true" >> $GITHUB_OUTPUT
            echo "| @smith-horn/enterprise | $VERSION | $PUBLISHED | ⏭️ Skip |" >> $GITHUB_STEP_SUMMARY
          else
            echo "enterprise_exists=false" >> $GITHUB_OUTPUT
            echo "| @smith-horn/enterprise | $VERSION | - | 📦 Publish |" >> $GITHUB_STEP_SUMMARY
            ANY_TO_PUBLISH=true
          fi

          echo "any_to_publish=$ANY_TO_PUBLISH" >> $GITHUB_OUTPUT

      - name: Validate .npmignore files exist
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Package Configuration Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | .npmignore | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------------|--------|" >> $GITHUB_STEP_SUMMARY

          MISSING=0
          for pkg in packages/*/; do
            PKG_NAME=$(basename "$pkg")
            if [ ! -f "${pkg}.npmignore" ]; then
              echo "::warning file=${pkg}package.json::Missing .npmignore file in $PKG_NAME - test files may be included in package"
              echo "| $PKG_NAME | Missing | ⚠️ Warning |" >> $GITHUB_STEP_SUMMARY
              MISSING=1
            else
              echo "| $PKG_NAME | Present | ✅ |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ $MISSING -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All packages have .npmignore files" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Validate package scopes for GitHub Packages
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scope Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          for pkg in packages/*/package.json; do
            PKG_NAME=$(jq -r '.name' "$pkg")
            REGISTRY=$(jq -r '.publishConfig.registry // empty' "$pkg")

            if [[ "$REGISTRY" == *"npm.pkg.github.com"* ]]; then
              SCOPE=$(echo "$PKG_NAME" | cut -d'/' -f1 | tr -d '@' | tr '[:upper:]' '[:lower:]')
              if [[ "$SCOPE" != "$OWNER" ]]; then
                echo "::error file=$pkg::Package scope '@$SCOPE' doesn't match org '$OWNER'"
                exit 1
              fi
              echo "✅ $PKG_NAME scope matches org" >> $GITHUB_STEP_SUMMARY
            fi
          done

      # SMI-2230: Validate package.json and server.json versions match
      - name: Validate version sync (MCP server)
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Version Sync Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PKG_VERSION=$(jq -r .version packages/mcp-server/package.json)
          SERVER_VERSION=$(jq -r .version packages/mcp-server/server.json)
          SERVER_PKG_VERSION=$(jq -r '.packages[0].version' packages/mcp-server/server.json)

          if [ "$PKG_VERSION" != "$SERVER_VERSION" ]; then
            echo "::error::Version mismatch: package.json ($PKG_VERSION) != server.json ($SERVER_VERSION)"
            echo "❌ package.json ($PKG_VERSION) != server.json ($SERVER_VERSION)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [ "$PKG_VERSION" != "$SERVER_PKG_VERSION" ]; then
            echo "::error::Version mismatch: server.json version ($SERVER_VERSION) != packages[0].version ($SERVER_PKG_VERSION)"
            echo "❌ server.json version != packages[0].version" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ MCP server version sync: $PKG_VERSION" >> $GITHUB_STEP_SUMMARY

  # Build Docker image once, use for all jobs (matches ci.yml pattern)
  # SMI-1319: Skip Docker build if nothing to publish
  docker-build:
    needs: pre-publish-check
    if: needs.pre-publish-check.outputs.any-to-publish == 'true'
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-3606: Decrypt enterprise source + supabase functions for Docker build context
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # Install git-crypt
          sudo apt-get update && sudo apt-get install -y git-crypt
          # Decode and write key file
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          # Unlock repository
          git-crypt unlock /tmp/git-crypt-key
          # Clean up key file
          rm -f /tmp/git-crypt-key
          echo "✓ git-crypt unlocked successfully"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and cache Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: false
          load: true
          tags: skillsmith-publish:${{ github.sha }}
          cache-from: type=gha,scope=publish
          cache-to: type=gha,mode=min,scope=publish
          target: dev

      - name: Save Docker image
        run: docker save skillsmith-publish:${{ github.sha }} | gzip > /tmp/skillsmith-publish.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        continue-on-error: true # audit:allow-continue-on-error — Don't fail if storage quota exceeded
        with:
          name: docker-image-publish
          path: /tmp/skillsmith-publish.tar.gz
          retention-days: 1

      - name: Extract node_modules from Docker image
        # SMI-4209: capture nested per-package node_modules alongside root.
        # npm nests deps that can't be hoisted (e.g. @astrojs/vercel@10.0.4 under
        # packages/website/ due to peer-dep conflicts). If the extract only grabs
        # /app/node_modules, Astro's ESM config resolver fails at
        # packages/website/astro.config.mjs → @astrojs/vercel.
        run: |
          docker create --name extract-deps skillsmith-publish:${{ github.sha }}
          docker cp extract-deps:/app/node_modules /tmp/node_modules
          mkdir -p /tmp/packages
          for pkg in cli core enterprise mcp-server vscode-extension website; do
            docker cp "extract-deps:/app/packages/$pkg/node_modules" "/tmp/packages/$pkg/node_modules" 2>/dev/null || true
          done
          docker rm extract-deps
          tar -czf /tmp/node_modules.tar.gz -C /tmp node_modules packages

      - name: Upload node_modules artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        continue-on-error: true # audit:allow-continue-on-error — Don't fail if storage quota exceeded
        with:
          name: node-modules-publish
          path: /tmp/node_modules.tar.gz
          retention-days: 1
          compression-level: 1

  # Validate before publishing (using Docker)
  # SMI-1319: Skip validation if nothing to publish
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pre-publish-check, docker-build]
    if: needs.pre-publish-check.outputs.any-to-publish == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-3606: Decrypt enterprise source for build/test/typecheck/lint
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # Install git-crypt
          sudo apt-get update && sudo apt-get install -y git-crypt
          # Decode and write key file
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          # Unlock repository
          git-crypt unlock /tmp/git-crypt-key
          # Clean up key file
          rm -f /tmp/git-crypt-key
          echo "✓ git-crypt unlocked successfully"

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download-docker
        continue-on-error: true
        with:
          name: docker-image-publish
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download-modules
        continue-on-error: true # audit:allow-continue-on-error — best-effort cache; falls back to npm ci
        with:
          name: node-modules-publish
          path: /tmp

      - name: Setup Node.js (fallback if no artifacts)
        if: steps.download-docker.outcome == 'failure'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (fallback if no artifacts)
        if: steps.download-docker.outcome == 'failure'
        run: npm ci

      - name: Load Docker image
        if: steps.download-docker.outcome == 'success'
        run: gunzip -c /tmp/skillsmith-publish.tar.gz | docker load

      - name: Extract node_modules
        if: steps.download-modules.outcome == 'success'
        run: tar -xzf /tmp/node_modules.tar.gz -C ${{ github.workspace }}

      # SMI-4188: scope Validate build to publishable packages only.
      # Turbo resolves `dependsOn: ["^build"]` upstreams, so filtering on the
      # four publishables still builds @skillsmith/core as a dependency of
      # cli/mcp-server/enterprise. Excludes @skillsmith/website (private)
      # and skillsmith-vscode (published by publish-vscode.yml).
      - name: Build publishable packages (Docker)
        if: steps.download-docker.outcome == 'success'
        env:
          FILTERS: --filter=${{ join(fromJSON(env.PUBLISHABLE_PACKAGES_JSON), ' --filter=') }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-publish:${{ github.sha }} \
            sh -c "npx turbo build $FILTERS"

      - name: Build publishable packages (fallback)
        if: steps.download-docker.outcome == 'failure'
        env:
          FILTERS: --filter=${{ join(fromJSON(env.PUBLISHABLE_PACKAGES_JSON), ' --filter=') }}
        run: npx turbo build $FILTERS

      # SMI-4188: non-gating website build canary.
      # Keeps the @astrojs/vercel root-cause follow-up visible as a yellow
      # warning on every publish run. If this persists week over week, the
      # linked Linear issue is visibly overdue.
      - name: Website build canary (non-gating)
        if: steps.download-docker.outcome == 'success'
        continue-on-error: true # audit:allow-continue-on-error — visibility canary, not a gate
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-publish:${{ github.sha }} \
            sh -c "npx turbo build --filter=@skillsmith/website || true"

      - name: Run tests (Docker)
        if: steps.download-docker.outcome == 'success'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-publish:${{ github.sha }} \
            npm test

      - name: Run tests (fallback)
        if: steps.download-docker.outcome == 'failure'
        run: npm test

      - name: Type check (Docker)
        if: steps.download-docker.outcome == 'success'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-publish:${{ github.sha }} \
            npm run typecheck

      - name: Type check (fallback)
        if: steps.download-docker.outcome == 'failure'
        run: npm run typecheck

      - name: Lint (Docker)
        if: steps.download-docker.outcome == 'success'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-publish:${{ github.sha }} \
            npm run lint

      - name: Lint (fallback)
        if: steps.download-docker.outcome == 'failure'
        run: npm run lint

  # Publish free tier packages to public npm
  # Note: npm publish requires direct npm ci for registry authentication
  # SMI-1278: Added version check to prevent 403 errors on duplicate publish
  # SMI-1319: Use pre-publish-check outputs to skip already-published packages
  publish-core:
    name: Publish @skillsmith/core
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pre-publish-check, validate]
    if: |
      (github.event_name == 'release' || github.event.inputs.dry_run == 'false') &&
      needs.pre-publish-check.outputs.core-exists != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-3606: Decrypt for workspace build resolution
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # Install git-crypt
          sudo apt-get update && sudo apt-get install -y git-crypt
          # Decode and write key file
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          # Unlock repository
          git-crypt unlock /tmp/git-crypt-key
          # Clean up key file
          rm -f /tmp/git-crypt-key
          echo "✓ git-crypt unlocked successfully"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core package
        run: npm run build -w @skillsmith/core

      - name: Check if version already published
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/core/package.json').version")
          NPM_VERSION=$(npm view @skillsmith/core version 2>/dev/null || echo 'not-found')
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT
          if [ "$PACKAGE_VERSION" = "$NPM_VERSION" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::@skillsmith/core@$PACKAGE_VERSION already published, skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Publishing @skillsmith/core@$PACKAGE_VERSION (current npm: $NPM_VERSION)"
          fi

      # SMI-4188: mirror guard — refuses when proposed <= highest published,
      # or exact-equal. Catches the TOCTOU window between prepare-release
      # validation and actual npm publish, plus the <-latest-but-unpublished
      # case that the inline version-check step misses (exact-equal only).
      - name: Pre-publish collision mirror guard
        if: steps.version-check.outputs.exists != 'true'
        run: |
          VERSION=$(jq -r .version packages/core/package.json)
          node scripts/check-publish-collision.mjs @skillsmith/core "$VERSION"

      - name: Publish core
        if: steps.version-check.outputs.exists != 'true'
        run: npm publish -w @skillsmith/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SKILLSMITH_NPM_TOKEN }}

  # SMI-1319: Use pre-publish-check outputs to skip already-published packages
  publish-mcp-server:
    name: Publish @skillsmith/mcp-server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pre-publish-check, validate, publish-core]
    if: |
      (github.event_name == 'release' || github.event.inputs.dry_run == 'false') &&
      needs.pre-publish-check.outputs.mcp-exists != 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-3606: Decrypt for workspace build resolution
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # Install git-crypt
          sudo apt-get update && sudo apt-get install -y git-crypt
          # Decode and write key file
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          # Unlock repository
          git-crypt unlock /tmp/git-crypt-key
          # Clean up key file
          rm -f /tmp/git-crypt-key
          echo "✓ git-crypt unlocked successfully"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Check if version already published
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/mcp-server/package.json').version")
          NPM_VERSION=$(npm view @skillsmith/mcp-server version 2>/dev/null || echo 'not-found')
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT
          if [ "$PACKAGE_VERSION" = "$NPM_VERSION" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::@skillsmith/mcp-server@$PACKAGE_VERSION already published, skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Publishing @skillsmith/mcp-server@$PACKAGE_VERSION (current npm: $NPM_VERSION)"
          fi

      # SMI-4188: mirror guard — see publish-core job for rationale.
      - name: Pre-publish collision mirror guard
        if: steps.version-check.outputs.exists != 'true'
        run: |
          VERSION=$(jq -r .version packages/mcp-server/package.json)
          node scripts/check-publish-collision.mjs @skillsmith/mcp-server "$VERSION"

      - name: Publish mcp-server
        if: steps.version-check.outputs.exists != 'true'
        run: npm publish -w @skillsmith/mcp-server --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SKILLSMITH_NPM_TOKEN }}

      # SMI-2158: Publish to MCP Registry after npm publish
      - name: Install mcp-publisher
        if: steps.version-check.outputs.exists != 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz
          chmod +x mcp-publisher

      - name: Publish to MCP Registry
        if: steps.version-check.outputs.exists != 'true'
        run: |
          cd packages/mcp-server
          ../../mcp-publisher publish
        env:
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}

  # SMI-1319: Use pre-publish-check outputs to skip already-published packages
  publish-cli:
    name: Publish @skillsmith/cli
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pre-publish-check, validate, publish-core]
    if: |
      (github.event_name == 'release' || github.event.inputs.dry_run == 'false') &&
      needs.pre-publish-check.outputs.cli-exists != 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-3606: Decrypt for workspace build resolution
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # Install git-crypt
          sudo apt-get update && sudo apt-get install -y git-crypt
          # Decode and write key file
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          # Unlock repository
          git-crypt unlock /tmp/git-crypt-key
          # Clean up key file
          rm -f /tmp/git-crypt-key
          echo "✓ git-crypt unlocked successfully"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Check if version already published
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/cli/package.json').version")
          NPM_VERSION=$(npm view @skillsmith/cli version 2>/dev/null || echo 'not-found')
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT
          if [ "$PACKAGE_VERSION" = "$NPM_VERSION" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::@skillsmith/cli@$PACKAGE_VERSION already published, skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Publishing @skillsmith/cli@$PACKAGE_VERSION (current npm: $NPM_VERSION)"
          fi

      # SMI-4188: mirror guard — see publish-core job for rationale.
      - name: Pre-publish collision mirror guard
        if: steps.version-check.outputs.exists != 'true'
        run: |
          VERSION=$(jq -r .version packages/cli/package.json)
          node scripts/check-publish-collision.mjs @skillsmith/cli "$VERSION"

      - name: Publish cli
        if: steps.version-check.outputs.exists != 'true'
        run: npm publish -w @skillsmith/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SKILLSMITH_NPM_TOKEN }}

  # Publish enterprise package to GitHub Packages (private)
  # SMI-1319: Use pre-publish-check outputs to skip already-published packages
  publish-enterprise:
    name: Publish @smith-horn/enterprise
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pre-publish-check, validate, publish-core]
    if: |
      (github.event_name == 'release' || github.event.inputs.dry_run == 'false') &&
      needs.pre-publish-check.outputs.enterprise-exists != 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-3606: Decrypt enterprise source for build + publish
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # Install git-crypt
          sudo apt-get update && sudo apt-get install -y git-crypt
          # Decode and write key file
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          # Unlock repository
          git-crypt unlock /tmp/git-crypt-key
          # Clean up key file
          rm -f /tmp/git-crypt-key
          echo "✓ git-crypt unlocked successfully"

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@smith-horn'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      # Note: GITHUB_TOKEN needs packages:read scope for version check
      - name: Check if version already published
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/enterprise/package.json').version")
          # GitHub Packages uses different registry - check there
          NPM_VERSION=$(npm view @smith-horn/enterprise version --registry=https://npm.pkg.github.com 2>/dev/null || echo 'not-found')
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT
          if [ "$PACKAGE_VERSION" = "$NPM_VERSION" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::@smith-horn/enterprise@$PACKAGE_VERSION already published, skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Publishing @smith-horn/enterprise@$PACKAGE_VERSION (current registry: $NPM_VERSION)"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SMI-4188: mirror guard — see publish-core job for rationale.
      # GitHub Packages requires NPM_CONFIG_REGISTRY pointing at npm.pkg.github.com.
      - name: Pre-publish collision mirror guard
        if: steps.version-check.outputs.exists != 'true'
        env:
          NPM_CONFIG_REGISTRY: https://npm.pkg.github.com
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version packages/enterprise/package.json)
          node scripts/check-publish-collision.mjs @smith-horn/enterprise "$VERSION"

      - name: Publish enterprise to GitHub Packages
        if: steps.version-check.outputs.exists != 'true'
        run: npm publish -w @smith-horn/enterprise
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # SMI-2230: Smoke test published packages
  smoke-test:
    name: Smoke Test Published Packages
    runs-on: ubuntu-latest
    needs: [publish-core, publish-mcp-server, publish-cli]
    if: always() && (needs.publish-core.result == 'success' || needs.publish-mcp-server.result == 'success' || needs.publish-cli.result == 'success')
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for npm propagation
        run: sleep 15

      - name: Smoke test @skillsmith/core
        if: needs.publish-core.result == 'success'
        run: |
          echo "## Smoke Test: @skillsmith/core" >> $GITHUB_STEP_SUMMARY
          VERSION=$(jq -r .version packages/core/package.json)
          npx tsx scripts/smoke-test-published.ts @skillsmith/core $VERSION
          echo "✅ @skillsmith/core@$VERSION smoke test passed" >> $GITHUB_STEP_SUMMARY

      - name: Smoke test @skillsmith/mcp-server
        if: needs.publish-mcp-server.result == 'success'
        run: |
          echo "## Smoke Test: @skillsmith/mcp-server" >> $GITHUB_STEP_SUMMARY
          VERSION=$(jq -r .version packages/mcp-server/package.json)
          npx tsx scripts/smoke-test-published.ts @skillsmith/mcp-server $VERSION
          echo "✅ @skillsmith/mcp-server@$VERSION smoke test passed" >> $GITHUB_STEP_SUMMARY

      - name: Smoke test @skillsmith/cli
        if: needs.publish-cli.result == 'success'
        run: |
          echo "## Smoke Test: @skillsmith/cli" >> $GITHUB_STEP_SUMMARY
          VERSION=$(jq -r .version packages/cli/package.json)
          npx tsx scripts/smoke-test-published.ts @skillsmith/cli $VERSION
          echo "✅ @skillsmith/cli@$VERSION smoke test passed" >> $GITHUB_STEP_SUMMARY

  # SMI-4191: create matching GitHub Release for each package that was published.
  # Tag convention: @skillsmith/<name>-v<X.Y.Z> (matches 2026-03-07 precedent).
  # 422 already_exists treated as success — drift detector may have created it first.
  create-gh-release:
    name: Create GitHub Releases
    runs-on: ubuntu-latest
    needs: [publish-core, publish-mcp-server, publish-cli, smoke-test]
    if: always() && (needs.publish-core.result == 'success' || needs.publish-mcp-server.result == 'success' || needs.publish-cli.result == 'success')
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Create releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CORE_RESULT: ${{ needs.publish-core.result }}
          MCP_RESULT: ${{ needs.publish-mcp-server.result }}
          CLI_RESULT: ${{ needs.publish-cli.result }}
        run: |
          set -euo pipefail
          echo "## GitHub Release Creation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '| Package | Version | Tag | Status |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---------|---------|-----|--------|' >> "$GITHUB_STEP_SUMMARY"

          create_release () {
            local short="$1" dir="$2" npm_name="$3" result="$4"
            if [ "$result" != "success" ]; then
              echo "| $npm_name | (not published) | — | ⏭️ skip |" >> "$GITHUB_STEP_SUMMARY"
              return 0
            fi
            local version tag title
            version=$(jq -r .version "$dir/package.json")
            tag="${npm_name}-v${version}"
            title="${npm_name} v${version}"

            if gh release view "$tag" >/dev/null 2>&1; then
              echo "| $npm_name | $version | $tag | ℹ️ exists |" >> "$GITHUB_STEP_SUMMARY"
              return 0
            fi

            local notes_file
            notes_file=$(mktemp)
            if ! node scripts/extract-changelog-section.mjs --package "$dir" --version "$version" > "$notes_file" 2>/dev/null; then
              echo "Release $version." > "$notes_file"
            fi

            if gh release create "$tag" --title "$title" --notes-file "$notes_file" --target main; then
              echo "| $npm_name | $version | $tag | ✅ created |" >> "$GITHUB_STEP_SUMMARY"
            else
              # Race with detect-release-drift.yml — tolerate already_exists.
              if gh release view "$tag" >/dev/null 2>&1; then
                echo "| $npm_name | $version | $tag | ℹ️ race (exists) |" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "| $npm_name | $version | $tag | ❌ error |" >> "$GITHUB_STEP_SUMMARY"
                return 1
              fi
            fi
          }

          create_release core packages/core @skillsmith/core "$CORE_RESULT"
          create_release mcp-server packages/mcp-server @skillsmith/mcp-server "$MCP_RESULT"
          create_release cli packages/cli @skillsmith/cli "$CLI_RESULT"

  # Summary job
  publish-summary:
    name: Publish Summary
    runs-on: ubuntu-latest
    needs:
      [
        publish-core,
        publish-mcp-server,
        publish-cli,
        publish-enterprise,
        smoke-test,
        create-gh-release,
      ]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "## Publish Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status | Smoke Test |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| @skillsmith/core | ${{ needs.publish-core.result }} | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| @skillsmith/mcp-server | ${{ needs.publish-mcp-server.result }} | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| @skillsmith/cli | ${{ needs.publish-cli.result }} | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| @smith-horn/enterprise | ${{ needs.publish-enterprise.result }} | N/A |" >> $GITHUB_STEP_SUMMARY
