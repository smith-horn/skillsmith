name: Weekly A/B Experiment Results
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      create_issue:
        description: Create GitHub issue with results
        required: false
        default: 'true'
        type: string

permissions:
  contents: read
  id-token: write
  issues: write

env:
  GA4_PROPERTY_ID: ${{ vars.GA4_PROPERTY_ID }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
  EXPERIMENT_START: '2026-02-21'
  MIN_COHORT_SIZE: '500'
  MIN_RUNTIME_DAYS: '7'
  PROMOTION_LIFT_PCT: '20'

jobs:
  results:
    name: A/B Experiment Results
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate Variables
        run: |
          MISSING=""
          [ -z "$GA4_PROPERTY_ID" ] && MISSING="$MISSING GA4_PROPERTY_ID"
          [ -z "$GCP_PROJECT_ID" ] && MISSING="$MISSING GCP_PROJECT_ID"
          [ -z "$GCP_WIF_PROVIDER" ] && MISSING="$MISSING GCP_WIF_PROVIDER"
          [ -z "$GCP_SERVICE_ACCOUNT" ] && MISSING="$MISSING GCP_SERVICE_ACCOUNT"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required repository variables:$MISSING"
            echo "Set these at: Settings > Secrets and variables > Actions > Variables"
            exit 1
          fi
          echo "Variables validated"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/analytics.readonly

      - name: Query GA4 baseline (no custom dimensions)
        id: baseline
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"dateRanges\":[{\"startDate\":\"${EXPERIMENT_START}\",\"endDate\":\"yesterday\"}],\"metrics\":[{\"name\":\"sessions\"}]}" \
            "https://analyticsdata.googleapis.com/v1beta/${GA4_PROPERTY_ID}:runReport")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::GA4 baseline query returned HTTP $HTTP_CODE"
            echo "$BODY" | head -20
            exit 1
          fi

          ERROR=$(echo "$BODY" | jq -r '.error.message // empty')
          if [ -n "$ERROR" ]; then
            echo "::error::GA4 API error: $ERROR"
            exit 1
          fi

          TOTAL=$(echo "$BODY" | jq -r '[.rows[]?.metricValues[0].value | tonumber] | add // 0')
          echo "total_sessions=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "Baseline total sessions (no custom dimension): ${TOTAL}"

      - name: Query GA4 sessions and events by variant
        id: ga4
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          START_EPOCH=$(date -d "$EXPERIMENT_START" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$EXPERIMENT_START" +%s)
          RUNTIME_DAYS=$(( ($(date +%s) - START_EPOCH) / 86400 ))
          echo "runtime_days=${RUNTIME_DAYS}" >> "$GITHUB_OUTPUT"
          echo "Runtime: ${RUNTIME_DAYS} days"

          # Sessions by variant
          SESSIONS_FULL=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"dateRanges\":[{\"startDate\":\"${EXPERIMENT_START}\",\"endDate\":\"yesterday\"}],\"dimensions\":[{\"name\":\"customUser:homepage_ab_variant\"}],\"metrics\":[{\"name\":\"sessions\"}]}" \
            "https://analyticsdata.googleapis.com/v1beta/${GA4_PROPERTY_ID}:runReport")

          SESSIONS_HTTP=$(echo "$SESSIONS_FULL" | tail -n1)
          SESSIONS_RESP=$(echo "$SESSIONS_FULL" | sed '$d')

          if [ "$SESSIONS_HTTP" -ne 200 ]; then
            echo "::error::GA4 sessions query returned HTTP $SESSIONS_HTTP"
            echo "$SESSIONS_RESP" | head -20
            exit 1
          fi

          SESSIONS_ERROR=$(echo "$SESSIONS_RESP" | jq -r '.error.message // empty')
          if [ -n "$SESSIONS_ERROR" ]; then
            echo "::error::GA4 sessions API error: $SESSIONS_ERROR"
            exit 1
          fi

          SESSIONS_ROW_COUNT=$(echo "$SESSIONS_RESP" | jq '[.rows[]?] | length')
          echo "Sessions response row count: ${SESSIONS_ROW_COUNT}"

          # Events (copy_config) by variant
          EVENTS_FULL=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"dateRanges\":[{\"startDate\":\"${EXPERIMENT_START}\",\"endDate\":\"yesterday\"}],\"dimensions\":[{\"name\":\"customUser:homepage_ab_variant\"}],\"metrics\":[{\"name\":\"eventCount\"}],\"dimensionFilter\":{\"filter\":{\"fieldName\":\"eventName\",\"stringFilter\":{\"matchType\":\"EXACT\",\"value\":\"copy_config\"}}}}" \
            "https://analyticsdata.googleapis.com/v1beta/${GA4_PROPERTY_ID}:runReport")

          EVENTS_HTTP=$(echo "$EVENTS_FULL" | tail -n1)
          EVENTS_RESP=$(echo "$EVENTS_FULL" | sed '$d')

          if [ "$EVENTS_HTTP" -ne 200 ]; then
            echo "::error::GA4 events query returned HTTP $EVENTS_HTTP"
            echo "$EVENTS_RESP" | head -20
            exit 1
          fi

          EVENTS_ERROR=$(echo "$EVENTS_RESP" | jq -r '.error.message // empty')
          if [ -n "$EVENTS_ERROR" ]; then
            echo "::error::GA4 events API error: $EVENTS_ERROR"
            exit 1
          fi

          EVENTS_ROW_COUNT=$(echo "$EVENTS_RESP" | jq '[.rows[]?] | length')
          echo "Events response row count: ${EVENTS_ROW_COUNT}"

          # Extract all three cohorts
          CTRL_SESSIONS=$(echo "$SESSIONS_RESP" | jq -r '.rows[]? | select(.dimensionValues[0].value == "control") | .metricValues[0].value')
          VARA_SESSIONS=$(echo "$SESSIONS_RESP" | jq -r '.rows[]? | select(.dimensionValues[0].value == "variant-a") | .metricValues[0].value')
          VARB_SESSIONS=$(echo "$SESSIONS_RESP" | jq -r '.rows[]? | select(.dimensionValues[0].value == "variant-b") | .metricValues[0].value')
          CTRL_EVENTS=$(echo "$EVENTS_RESP" | jq -r '.rows[]? | select(.dimensionValues[0].value == "control") | .metricValues[0].value')
          VARA_EVENTS=$(echo "$EVENTS_RESP" | jq -r '.rows[]? | select(.dimensionValues[0].value == "variant-a") | .metricValues[0].value')
          VARB_EVENTS=$(echo "$EVENTS_RESP" | jq -r '.rows[]? | select(.dimensionValues[0].value == "variant-b") | .metricValues[0].value')

          echo "ctrl_sessions=${CTRL_SESSIONS:-0}" >> "$GITHUB_OUTPUT"
          echo "vara_sessions=${VARA_SESSIONS:-0}" >> "$GITHUB_OUTPUT"
          echo "varb_sessions=${VARB_SESSIONS:-0}" >> "$GITHUB_OUTPUT"
          echo "ctrl_events=${CTRL_EVENTS:-0}" >> "$GITHUB_OUTPUT"
          echo "vara_events=${VARA_EVENTS:-0}" >> "$GITHUB_OUTPUT"
          echo "varb_events=${VARB_EVENTS:-0}" >> "$GITHUB_OUTPUT"
          echo "sessions_row_count=${SESSIONS_ROW_COUNT}" >> "$GITHUB_OUTPUT"
          echo "control: ${CTRL_SESSIONS:-0} sessions, ${CTRL_EVENTS:-0} events"
          echo "variant-a: ${VARA_SESSIONS:-0} sessions, ${VARA_EVENTS:-0} events"
          echo "variant-b: ${VARB_SESSIONS:-0} sessions, ${VARB_EVENTS:-0} events"

      - name: Compute statistics
        id: stats
        env:
          CTRL_N: ${{ steps.ga4.outputs.ctrl_sessions }}
          VARB_N: ${{ steps.ga4.outputs.varb_sessions }}
          CTRL_K: ${{ steps.ga4.outputs.ctrl_events }}
          VARB_K: ${{ steps.ga4.outputs.varb_events }}
          RUNTIME: ${{ steps.ga4.outputs.runtime_days }}
        run: |
          CTRL_N="${CTRL_N:-0}"
          VARB_N="${VARB_N:-0}"
          CTRL_K="${CTRL_K:-0}"
          VARB_K="${VARB_K:-0}"
          RUNTIME="${RUNTIME:-0}"

          if [ "$CTRL_N" -gt 0 ]; then
            CTRL_RATE=$(echo "scale=4; $CTRL_K / $CTRL_N * 100" | bc)
          else
            CTRL_RATE="0"
          fi
          if [ "$VARB_N" -gt 0 ]; then
            VARB_RATE=$(echo "scale=4; $VARB_K / $VARB_N * 100" | bc)
          else
            VARB_RATE="0"
          fi
          if [ "$(echo "$CTRL_RATE > 0" | bc)" -eq 1 ]; then
            LIFT=$(echo "scale=2; ($VARB_RATE - $CTRL_RATE) / $CTRL_RATE * 100" | bc)
          else
            LIFT="0"
          fi

          TOTAL_N=$(( CTRL_N + VARB_N ))
          TOTAL_K=$(( CTRL_K + VARB_K ))
          Z_SCORE="0"
          P_VALUE="1.0000"

          if [ "$TOTAL_N" -gt 0 ] && [ "$TOTAL_K" -gt 0 ] && [ "$CTRL_N" -gt 0 ] && [ "$VARB_N" -gt 0 ]; then
            P_POOL=$(echo "scale=8; $TOTAL_K / $TOTAL_N" | bc)
            Q_POOL=$(echo "scale=8; 1 - $P_POOL" | bc)
            VAR=$(echo "scale=10; $P_POOL * $Q_POOL * (1/$CTRL_N + 1/$VARB_N)" | bc -l)
            SE=$(echo "scale=8; sqrt($VAR)" | bc -l)
            if [ "$(echo "$SE > 0" | bc)" -eq 1 ]; then
              CTRL_R=$(echo "scale=8; $CTRL_K / $CTRL_N" | bc)
              VARB_R=$(echo "scale=8; $VARB_K / $VARB_N" | bc)
              Z_SCORE=$(echo "scale=3; ($VARB_R - $CTRL_R) / $SE" | bc -l)
              ABS_Z=$(echo "scale=4; if ($Z_SCORE < 0) -($Z_SCORE) else $Z_SCORE" | bc)
              P_VALUE=$(echo "scale=4; t = 1/(1 + 0.2316419*$ABS_Z); pdf = (1/sqrt(2*3.14159265))*e(-$ABS_Z*$ABS_Z/2); poly = t*(0.319381530 + t*(-0.356563782 + t*(1.781477937 + t*(-1.821255978 + t*1.330274429)))); p = 2*pdf*poly; if (p > 1) 1 else if (p < 0) 0 else p" | bc -l)
            fi
          fi

          ENOUGH_RUNTIME=$([ "$RUNTIME" -ge "$MIN_RUNTIME_DAYS" ] && echo "1" || echo "0")
          ENOUGH_SAMPLE=$([ "$(( CTRL_N < VARB_N ? CTRL_N : VARB_N ))" -ge "$MIN_COHORT_SIZE" ] && echo "1" || echo "0")
          SIGNIFICANT=$(echo "if ($P_VALUE < 0.05) 1 else 0" | bc)
          POSITIVE=$(echo "if ($LIFT >= $PROMOTION_LIFT_PCT) 1 else 0" | bc)
          NEGATIVE=$(echo "if ($LIFT < 0) 1 else 0" | bc)

          if [ "$ENOUGH_RUNTIME" -eq 0 ]; then
            VERDICT="WAITING - not enough runtime (${RUNTIME}/${MIN_RUNTIME_DAYS} days)"
            REC="wait"
          elif [ "$ENOUGH_SAMPLE" -eq 0 ]; then
            VERDICT="WAITING - not enough sample (need ${MIN_COHORT_SIZE}/cohort)"
            REC="wait"
          elif [ "$SIGNIFICANT" -eq 1 ] && [ "$POSITIVE" -eq 1 ]; then
            VERDICT="PROMOTE - variant-b wins (+${LIFT}% lift, p=${P_VALUE})"
            REC="promote"
          elif [ "$SIGNIFICANT" -eq 1 ] && [ "$NEGATIVE" -eq 1 ]; then
            VERDICT="REVERT - variant-b hurts (${LIFT}% lift, p=${P_VALUE})"
            REC="revert"
          else
            VERDICT="INCONCLUSIVE - lift=${LIFT}%, p=${P_VALUE}"
            REC="wait"
          fi

          echo "ctrl_rate=${CTRL_RATE}" >> "$GITHUB_OUTPUT"
          echo "varb_rate=${VARB_RATE}" >> "$GITHUB_OUTPUT"
          echo "lift=${LIFT}" >> "$GITHUB_OUTPUT"
          echo "z_score=${Z_SCORE}" >> "$GITHUB_OUTPUT"
          echo "p_value=${P_VALUE}" >> "$GITHUB_OUTPUT"
          {
            echo "verdict<<GHEOF"
            echo "$VERDICT"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"
          echo "recommendation=${REC}" >> "$GITHUB_OUTPUT"
          echo "=== RESULTS === control: ${CTRL_RATE}% (${CTRL_K}/${CTRL_N}) | variant-b: ${VARB_RATE}% (${VARB_K}/${VARB_N}) | lift: ${LIFT}% | z: ${Z_SCORE} | p: ${P_VALUE} | ${VERDICT}"

      - name: Ensure analytics label exists
        if: ${{ github.event.inputs.create_issue != 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create analytics --color "4A90D9" --description "Analytics reports and metrics" --repo smith-horn/skillsmith 2>/dev/null || true

      - name: Create GitHub issue
        if: ${{ github.event.inputs.create_issue != 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUNTIME: ${{ steps.ga4.outputs.runtime_days }}
          CTRL_N: ${{ steps.ga4.outputs.ctrl_sessions }}
          VARA_N: ${{ steps.ga4.outputs.vara_sessions }}
          VARB_N: ${{ steps.ga4.outputs.varb_sessions }}
          CTRL_K: ${{ steps.ga4.outputs.ctrl_events }}
          VARA_K: ${{ steps.ga4.outputs.vara_events }}
          VARB_K: ${{ steps.ga4.outputs.varb_events }}
          CTRL_RATE: ${{ steps.stats.outputs.ctrl_rate }}
          VARB_RATE: ${{ steps.stats.outputs.varb_rate }}
          LIFT: ${{ steps.stats.outputs.lift }}
          Z: ${{ steps.stats.outputs.z_score }}
          P: ${{ steps.stats.outputs.p_value }}
          VERDICT: ${{ steps.stats.outputs.verdict }}
          REC: ${{ steps.stats.outputs.recommendation }}
          BASELINE_SESSIONS: ${{ steps.baseline.outputs.total_sessions }}
          SESSIONS_ROW_COUNT: ${{ steps.ga4.outputs.sessions_row_count }}
        run: |
          WEEK=$(date +"%Y-%m-%d")
          case "$REC" in
            promote) EMOJI="green_circle" ;;
            revert)  EMOJI="red_circle" ;;
            *)       EMOJI="yellow_circle" ;;
          esac

          # Build diagnostic note if variant data is missing but baseline has data
          DIAG_NOTE=""
          CTRL_N="${CTRL_N:-0}"
          VARB_N="${VARB_N:-0}"
          VARA_N="${VARA_N:-0}"
          BASELINE_SESSIONS="${BASELINE_SESSIONS:-0}"
          SESSIONS_ROW_COUNT="${SESSIONS_ROW_COUNT:-0}"
          VARIANT_TOTAL=$(( CTRL_N + VARA_N + VARB_N ))
          if [ "$VARIANT_TOTAL" -eq 0 ] && [ "$BASELINE_SESSIONS" -gt 0 ]; then
            DIAG_NOTE=$(cat <<'DIAGEOF'

> **Diagnostic**: GA4 returned 0 sessions when grouped by `homepage_ab_variant` but baseline shows sessions.
> The custom user property may not yet be populated. It was registered on 2026-03-11;
> GA4 does not backfill custom dimensions — only new sessions after registration will have data.
> Allow 24-48h for data to accumulate.
DIAGEOF
)
          fi

          TITLE=":${EMOJI}: A/B Results (${WEEK}): ${VERDICT}"
          BODY=$(cat <<EOF
## Homepage A/B Results - ${WEEK}

Experiment: Category Grid (variant-b) vs Control | Runtime: ${RUNTIME} days

| Cohort | Sessions | copy_config | Rate |
|--------|----------|-------------|------|
| control | ${CTRL_N} | ${CTRL_K:-0} | ${CTRL_RATE}% |
| variant-a | ${VARA_N} | ${VARA_K:-0} | - |
| variant-b | ${VARB_N} | ${VARB_K:-0} | ${VARB_RATE}% |

Lift: ${LIFT}% | z: ${Z} | p: ${P}

**Verdict**: ${VERDICT}
${DIAG_NOTE}

<details><summary>Debug</summary>

baseline_sessions=${BASELINE_SESSIONS}, variant_rows=${SESSIONS_ROW_COUNT}

</details>

Criteria: >=7 days runtime (${RUNTIME}d), >=500/cohort, >=+20% lift, p<0.05

Baseline (pre-experiment 2026-02-21): 1.18% (6/506 sessions)
Kill switch: set HOMEPAGE_AB_ENABLED=false in Vercel to stop experiment.

Auto-generated by ab-results.yml | SMI-2700
EOF
)

          gh issue create \
            --repo smith-horn/skillsmith \
            --title "$TITLE" \
            --body "$BODY" \
            --label "analytics"

      - name: Report Failure
        if: failure() || cancelled()
        run: |
          echo "### A/B Results Workflow Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          echo "Common issues:" >> $GITHUB_STEP_SUMMARY
          echo "- Repository variables not set (Settings > Actions > Variables)" >> $GITHUB_STEP_SUMMARY
          echo "- WIF provider misconfigured" >> $GITHUB_STEP_SUMMARY
          echo "- Service account lacks GA4 Viewer role" >> $GITHUB_STEP_SUMMARY
          echo "- GA4 Data API not enabled in GCP project" >> $GITHUB_STEP_SUMMARY
          echo "- Custom dimension \`homepage_ab_variant\` not registered" >> $GITHUB_STEP_SUMMARY

      # SMI-3335: Alert on scheduled workflow failure
      - name: Alert on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "ci-alert" --search "A/B Results failed" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "Still failing: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            gh issue create --repo "${{ github.repository }}" --title "CI: A/B Results failed ($(date -u +%Y-%m-%d))" --label "ci-alert" --body "**Workflow**: A/B Results
          **Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch**: ${{ github.ref_name }}

          This issue was auto-created by SMI-3335. Close when resolved."
          fi
