# SMI-3542: Weekly Linear Drift Audit
# Detects issues marked "Done" without corresponding source code commits.
# Creates or updates a GitHub issue with governance label when drift is found.

name: Linear Drift Audit

on:
  schedule:
    # Monday 9 AM UTC — alongside ops-report
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: '22'

jobs:
  drift-audit:
    name: Audit Linear Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run drift audit
        id: audit
        continue-on-error: true
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/audit-linear-drift.mjs --json > /tmp/drift-results.json 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check for drift
        id: check
        if: steps.audit.outcome == 'success' || steps.audit.outcome == 'failure'
        run: |
          if [ -f /tmp/drift-results.json ]; then
            DRIFT_COUNT=$(jq -r '.drift | length' /tmp/drift-results.json 2>/dev/null || echo "0")
            echo "drift_count=$DRIFT_COUNT" >> $GITHUB_OUTPUT
          else
            echo "drift_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Ensure governance label exists
        if: steps.check.outputs.drift_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create governance --description "Governance and compliance tracking" --color "d93f0b" 2>/dev/null || true

      - name: Create or update governance issue
        if: steps.check.outputs.drift_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRIFT_COUNT=${{ steps.check.outputs.drift_count }}
          DATE=$(date -u +%Y-%m-%d)

          # Build issue body
          BODY="## Linear Drift Audit — $DATE

          **$DRIFT_COUNT issue(s)** marked Done without source code commits.

          ### Drift Details
          "

          # Append each drifted issue
          BODY+=$(jq -r '.drift[] | "- **\(.id)**: \(.title) (completed: \(.completedAt))"' /tmp/drift-results.json)

          BODY+="

          ### Resolution
          For each issue above, either:
          1. **Implement the code** and reference the issue in your commit
          2. **Add to allowlist** (.linear-drift-allowlist) if legitimately docs-only
          3. **Reopen the issue** if it was closed prematurely

          ---
          *Generated by [linear-drift-audit.yml](https://github.com/smith-horn/skillsmith/actions/workflows/linear-drift-audit.yml)*"

          # Check for existing open governance issue
          EXISTING=$(gh issue list --label governance --state open --search "Linear Drift Audit" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue edit "$EXISTING" --body "$BODY"
          else
            echo "Creating new governance issue"
            gh issue create \
              --title "Linear Drift Audit: $DRIFT_COUNT unverified issue(s) — $DATE" \
              --body "$BODY" \
              --label governance
          fi

      - name: Generate summary
        if: always()
        run: |
          echo "## Linear Drift Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/drift-results.json ]; then
            TOTAL=$(jq -r '.total' /tmp/drift-results.json 2>/dev/null || echo "?")
            VERIFIED=$(jq -r '.verified' /tmp/drift-results.json 2>/dev/null || echo "?")
            DRIFT=$(jq -r '.drift | length' /tmp/drift-results.json 2>/dev/null || echo "?")
            ALLOWLISTED=$(jq -r '.allowlisted' /tmp/drift-results.json 2>/dev/null || echo "?")
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total completed | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Verified | $VERIFIED |" >> $GITHUB_STEP_SUMMARY
            echo "| Allowlisted | $ALLOWLISTED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Drift** | **$DRIFT** |" >> $GITHUB_STEP_SUMMARY
          else
            echo "Audit did not produce results. Check logs." >> $GITHUB_STEP_SUMMARY
          fi
