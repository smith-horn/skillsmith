# SMI-3172: Daily Stripe Webhook Health Monitor
# Checks live-mode webhook endpoint status and subscribed events
# Created: 2026-03-10 (from SMI-3158 retro recommendation)
name: Stripe Webhook Monitor

on:
  schedule:
    # Daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  WEBHOOK_ENDPOINT_ID: 'we_1Su2xWE9ISBFQw5JH0bWXtNi'

jobs:
  webhook-health:
    name: Check Webhook Health
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check webhook endpoint status
        id: check
        env:
          STRIPE_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $STRIPE_KEY" \
            "https://api.stripe.com/v1/webhook_endpoints/${{ env.WEBHOOK_ENDPOINT_ID }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "status=api_error" >> $GITHUB_OUTPUT
            echo "detail=Stripe API returned HTTP $HTTP_CODE" >> $GITHUB_OUTPUT
            echo "healthy=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          STATUS=$(echo "$BODY" | jq -r '.status')
          ENABLED_EVENTS=$(echo "$BODY" | jq -r '.enabled_events[]' | sort)
          URL=$(echo "$BODY" | jq -r '.url')

          echo "endpoint_status=$STATUS" >> $GITHUB_OUTPUT
          echo "endpoint_url=$URL" >> $GITHUB_OUTPUT

          # Expected events (must match ops-report EXPECTED_EVENTS)
          EXPECTED="checkout.session.completed
          customer.subscription.created
          customer.subscription.deleted
          customer.subscription.trial_will_end
          customer.subscription.updated
          invoice.payment_failed
          invoice.payment_succeeded"

          MISSING=""
          while IFS= read -r evt; do
            if ! echo "$ENABLED_EVENTS" | grep -qx "$evt"; then
              MISSING="${MISSING}${evt}, "
            fi
          done <<< "$EXPECTED"

          if [ "$STATUS" != "enabled" ]; then
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "detail=Webhook status is '$STATUS' (expected 'enabled')" >> $GITHUB_OUTPUT
          elif [ -n "$MISSING" ]; then
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "detail=Missing events: ${MISSING%, }" >> $GITHUB_OUTPUT
          else
            echo "healthy=true" >> $GITHUB_OUTPUT
            echo "detail=Webhook enabled with all 7 expected events" >> $GITHUB_OUTPUT
          fi

          echo "## Stripe Webhook Health" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | ${{ env.WEBHOOK_ENDPOINT_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | $URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Events subscribed | $(echo "$ENABLED_EVENTS" | wc -l | tr -d ' ') |" >> $GITHUB_STEP_SUMMARY
          if [ -n "$MISSING" ]; then
            echo "| Missing events | ${MISSING%, } |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Checked: $(date -u +%Y-%m-%dT%H:%M:%SZ)*" >> $GITHUB_STEP_SUMMARY

      - name: Create alert issue
        if: steps.check.outputs.healthy == 'false'
        run: |
          TITLE="ALERT: Stripe webhook unhealthy - $(date +%Y-%m-%d)"

          # Check for existing open alert
          EXISTING=$(gh issue list \
            --search "ALERT: Stripe webhook unhealthy in:title" \
            --state open --limit 1 --json number | jq '.[0].number // 0')

          BODY="## Stripe Webhook Health Alert

          **Endpoint:** \`${{ env.WEBHOOK_ENDPOINT_ID }}\`
          **Status:** ${{ steps.check.outputs.endpoint_status }}
          **Finding:** ${{ steps.check.outputs.detail }}

          ### Remediation

          1. Go to [Stripe Dashboard > Developers > Webhooks](https://dashboard.stripe.com/webhooks)
          2. Find endpoint \`${{ env.WEBHOOK_ENDPOINT_ID }}\`
          3. Verify status is **Enabled** and all 7 events are subscribed
          4. If disabled, re-enable and replay missed events

          See: \`docs/internal/process/stripe-deploy-checklist.md\`

          ---
          *Auto-generated by stripe-webhook-monitor workflow (SMI-3172)*"

          if [ "$EXISTING" -gt 0 ]; then
            gh issue comment "$EXISTING" --body "## Update - $(date -u +%Y-%m-%dT%H:%M:%SZ)

          ${{ steps.check.outputs.detail }}"
          else
            gh label create stripe --color "635BFF" --description "Stripe billing and payment alerts" 2>/dev/null || true
            gh label create alert --color "D93F0B" --description "Automated alert" 2>/dev/null || true
            gh issue create --title "$TITLE" --body "$BODY" --label "stripe,alert"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report result
        run: |
          if [ "${{ steps.check.outputs.healthy }}" = "true" ]; then
            echo "Stripe webhook healthy: ${{ steps.check.outputs.detail }}"
          else
            echo "ALERT: ${{ steps.check.outputs.detail }}"
            exit 1
          fi
