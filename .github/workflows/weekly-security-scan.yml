# SMI-4392: Weekly Security Scan for Imported Skills
# SMI-4396: Gate reads post-allowlist quarantine count instead of raw severity.
# Runs the security scanner to identify vulnerabilities in skill definitions
# imported from the broader GitHub skill ecosystem. Distinct from
# `security-scan.yml` (SMI-1456), which scans fixture seed-skill data.
#
# Pipeline:
#   1. Run the GitHub importer to produce data/imported-skills.json
#   2. Run the scanner against that file
#   3. Create a security issue if HIGH/CRITICAL findings are present
#   4. Alert on scheduled failure (SMI-3335 alert-on-failure parity)
#
# Output Files:
# - data/imported-skills.json: GitHub-sourced skill corpus (input to scanner)
# - data/security-report.json: Full security report with all findings
# - data/quarantine-skills.json: Skills with HIGH/CRITICAL findings (blocked), post-allowlist
# - data/safe-skills.json: Skills approved for import (passed security scan)
# - data/skills-security-allowlist.json: Version-controlled per-skill exemptions (SMI-4396)

name: Weekly Security Scan

on:
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      create_issue:
        description: 'Create issue even if no critical findings'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: '22'

jobs:
  security-scan:
    name: Scan Imported Skills
    runs-on: ubuntu-latest
    # Bumped from 15m: GitHub import step adds ~20-30m (rate-limited search
    # across ~20 queries with pagination).
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build packages
        run: npm run build

      # SMI-4392: produce data/imported-skills.json (the scanner's expected
      # input). Prior to this step the workflow silently failed because the
      # input file was never materialised on the runner — `mkdir -p data`
      # created an empty directory and scan-imported-skills.ts exited 1 with
      # "Input file not found".
      - name: Import skills from GitHub
        id: import
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          npx tsx packages/core/src/scripts/import-github-skills.ts

          if [ ! -s data/imported-skills.json ]; then
            echo "::error::GitHub import did not produce data/imported-skills.json"
            exit 1
          fi

          SKILL_COUNT=$(jq 'length // 0' data/imported-skills.json)
          echo "Imported $SKILL_COUNT skills"
          echo "skill_count=$SKILL_COUNT" >> $GITHUB_OUTPUT

      - name: Run security scan
        id: scan
        run: |
          # Run the security scanner against the GitHub-imported corpus
          npx tsx packages/core/src/scripts/scan-imported-skills.ts

          # Parse results for GitHub Actions outputs
          if [ -f data/security-report.json ]; then
            TOTAL=$(jq -r '.summary.totalScanned // 0' data/security-report.json)
            PASSED=$(jq -r '.summary.passed // 0' data/security-report.json)
            QUARANTINED=$(jq -r '.summary.quarantined // 0' data/security-report.json)
            CRITICAL=$(jq -r '.summary.bySeverity.CRITICAL // 0' data/security-report.json)
            HIGH=$(jq -r '.summary.bySeverity.HIGH // 0' data/security-report.json)
            MEDIUM=$(jq -r '.summary.bySeverity.MEDIUM // 0' data/security-report.json)
            LOW=$(jq -r '.summary.bySeverity.LOW // 0' data/security-report.json)
            AVG_RISK=$(jq -r '.summary.averageRiskScore // 0' data/security-report.json)
            MAX_RISK=$(jq -r '.summary.maxRiskScore // 0' data/security-report.json)

            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "quarantined=$QUARANTINED" >> $GITHUB_OUTPUT
            echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
            echo "high=$HIGH" >> $GITHUB_OUTPUT
            echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
            echo "low=$LOW" >> $GITHUB_OUTPUT
            echo "avg_risk=$AVG_RISK" >> $GITHUB_OUTPUT
            echo "max_risk=$MAX_RISK" >> $GITHUB_OUTPUT

            # SMI-4396: Gate on post-allowlist quarantine count, not raw
            # severity tally. security-report.json.summary.bySeverity is
            # computed pre-allowlist and will still show non-zero critical/
            # high for allowlisted findings; quarantine-skills.json.count
            # is the post-allowlist view the allowlist was designed to drain.
            QUARANTINE_COUNT=$(jq -r '.count // 0' data/quarantine-skills.json)
            echo "quarantine_count=$QUARANTINE_COUNT" >> $GITHUB_OUTPUT

            if [ "$QUARANTINE_COUNT" -gt 0 ]; then
              echo "has_critical=true" >> $GITHUB_OUTPUT
            else
              echo "has_critical=false" >> $GITHUB_OUTPUT
            fi

            echo "::notice::Pre-allowlist severity tally: critical=$CRITICAL high=$HIGH medium=$MEDIUM low=$LOW"
            echo "::notice::Post-allowlist quarantine count: $QUARANTINE_COUNT (SMI-4396)"
          else
            echo "::error::Security report not generated"
            exit 1
          fi

      - name: Generate step summary
        run: |
          echo "## Weekly Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Skills Scanned | ${{ steps.scan.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed (Safe) | ${{ steps.scan.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quarantined | ${{ steps.scan.outputs.quarantined }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Findings by Severity" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| CRITICAL | ${{ steps.scan.outputs.critical }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HIGH | ${{ steps.scan.outputs.high }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MEDIUM | ${{ steps.scan.outputs.medium }} |" >> $GITHUB_STEP_SUMMARY
          echo "| LOW | ${{ steps.scan.outputs.low }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Risk Scores" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Average Risk Score | ${{ steps.scan.outputs.avg_risk }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Maximum Risk Score | ${{ steps.scan.outputs.max_risk }} |" >> $GITHUB_STEP_SUMMARY

          # Add warning banner if critical findings
          if [ "${{ steps.scan.outputs.has_critical }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> [!WARNING]" >> $GITHUB_STEP_SUMMARY
            echo "> **Critical or high severity findings detected.** Review quarantine-skills.json for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload security report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: security-report
          path: data/security-report.json
          retention-days: 14

      - name: Upload quarantine list
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: quarantine-skills
          path: data/quarantine-skills.json
          retention-days: 14

      - name: Upload safe skills list
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: safe-skills
          path: data/safe-skills.json
          retention-days: 14

      - name: Ensure security label exists
        run: |
          gh label create security --color "D73A4A" --description "Security-related issues and findings" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update issue if critical findings
        if: steps.scan.outputs.has_critical == 'true' || github.event.inputs.create_issue == 'true'
        run: |
          TITLE="Security Scan: ${{ steps.scan.outputs.critical }} critical, ${{ steps.scan.outputs.high }} high findings - $(date +%Y-%m-%d)"

          # Check if an open security scan issue already exists
          EXISTING=$(gh issue list --search "Security Scan: in:title" --state open --label security --limit 1 --json number | jq '.[0].number // 0')

          BODY="## Weekly Security Scan Report

          **Scan Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Workflow Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ### Summary

          | Metric | Value |
          |--------|-------|
          | Total Skills Scanned | ${{ steps.scan.outputs.total }} |
          | Passed (Safe) | ${{ steps.scan.outputs.passed }} |
          | Quarantined | ${{ steps.scan.outputs.quarantined }} |

          ### Findings by Severity

          | Severity | Count |
          |----------|-------|
          | CRITICAL | ${{ steps.scan.outputs.critical }} |
          | HIGH | ${{ steps.scan.outputs.high }} |
          | MEDIUM | ${{ steps.scan.outputs.medium }} |
          | LOW | ${{ steps.scan.outputs.low }} |

          ### Risk Scores

          - **Average Risk Score:** ${{ steps.scan.outputs.avg_risk }}
          - **Maximum Risk Score:** ${{ steps.scan.outputs.max_risk }}

          ### Action Required

          1. Download the \`quarantine-skills\` artifact from the workflow run
          2. Review each quarantined skill for legitimate security concerns
          3. Either fix the issues or add to the allowlist with justification

          ### Artifacts

          - [security-report.json](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) - Full scan results
          - [quarantine-skills.json](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) - Skills requiring review
          - [safe-skills.json](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) - Approved skills

          ---
          *Auto-generated by weekly-security-scan workflow*"

          if [ "$EXISTING" -gt 0 ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue comment "$EXISTING" --body "$BODY"
          else
            echo "Creating new security issue"
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "security"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if post-allowlist quarantine is non-empty
        if: steps.scan.outputs.has_critical == 'true'
        run: |
          echo "::error::Security scan quarantined ${{ steps.scan.outputs.quarantine_count }} skill(s) post-allowlist (pre-allowlist severity: critical=${{ steps.scan.outputs.critical }} high=${{ steps.scan.outputs.high }})"
          echo "Review the quarantine-skills artifact and created issue for details."
          echo "If a quarantined skill is a documented false positive, add an entry to data/skills-security-allowlist.json (SMI-4396)."
          exit 1

      - name: Report success
        if: steps.scan.outputs.has_critical != 'true'
        run: |
          echo ""
          echo "Security scan completed successfully"
          echo "- Total scanned: ${{ steps.scan.outputs.total }}"
          echo "- Passed: ${{ steps.scan.outputs.passed }}"
          echo "- Quarantined (post-allowlist): ${{ steps.scan.outputs.quarantine_count }}"
          echo "- Pre-allowlist severity: critical=${{ steps.scan.outputs.critical }} high=${{ steps.scan.outputs.high }} medium=${{ steps.scan.outputs.medium }} low=${{ steps.scan.outputs.low }}"

      # SMI-3335: Alert on scheduled workflow failure. Parity with
      # security-scan.yml (lines ~258-273). Without this step, scheduled
      # runs have failed silently for 10+ consecutive weeks (2026-02-15
      # onwards) because the workflow had no observable failure signal.
      - name: Alert on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure ci-alert label exists (idempotent; security-scan.yml
          # pattern, SMI-3335). Without this, first-time alert creation
          # fails with "could not add label".
          gh label create ci-alert --color "B60205" --description "CI workflow failure requiring attention" 2>/dev/null || true

          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "ci-alert" --search "Weekly Security Scan failed" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "Still failing: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            gh issue create --repo "${{ github.repository }}" --title "CI: Weekly Security Scan failed ($(date -u +%Y-%m-%d))" --label "ci-alert" --body "**Workflow**: Weekly Security Scan
          **Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch**: ${{ github.ref_name }}

          This issue was auto-created by SMI-3335 (parity ported via SMI-4392). Close when resolved."
          fi
