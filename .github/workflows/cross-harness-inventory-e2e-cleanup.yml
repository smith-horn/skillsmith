# SMI-5395 -- weekly cleanup of orphan user_devices rows generated by the
# cross-harness inventory e2e harness (M3).
#
# Covers SIGTERM orphaning: cancel-in-progress kills the test job mid-run,
# which can strand device rows whose afterEach cleanupDevice never fires.
# The main test job's defensive DELETE (P2-1) is run-scoped to this run_id
# only; this weekly cron is the time-bounded catch-all for all stale rows.
#
# Pattern: label LIKE 'e2e-inv-%' AND last_seen_at < now() - interval '1 day'.
# The time-bound (>1 day) makes the broad pattern SAFE -- it cannot affect
# rows still in use by a running test job (those were created within minutes).
# FK cascade on device_skills clears the skill rows automatically.
#
# Connection: STAGING_POOLER_URL (SMI-4937) -- the full staging transaction-pooler
# connection string secret. Constructing the string from the URL hit "Tenant or
# user not found"; the pre-formed secret is the proven fix (device-login-cleanup).
# Staging ref guard in the validate step refuses to run against prod.

name: Cross-Harness Inventory E2E Cleanup

on:
  schedule:
    - cron: '0 4 * * 0' # Sundays 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  cleanup:
    name: Delete >1-day orphan user_devices rows for inventory e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: e2e-staging
    permissions:
      contents: read
    steps:
      - name: Validate connection inputs
        env:
          STAGING_POOLER_URL: ${{ secrets.STAGING_POOLER_URL }}
        run: |
          set -eu
          if [ -z "${STAGING_POOLER_URL:-}" ]; then
            echo "::error::STAGING_POOLER_URL secret is empty or unset -- add the staging transaction-pooler connection string to the e2e-staging environment (SMI-4937)"
            exit 1
          fi
          # Refuse if the connection string points at the prod project.
          # Split literal so the preflight grep-gate (which scans this file)
          # does not self-match. Bash adjacent single-quoted strings concatenate.
          if printf '%s' "$STAGING_POOLER_URL" | grep -q 'vrcnzpmnd''troqxxoqkzy'; then
            echo "::error::STAGING_POOLER_URL contains the prod project ref -- refusing to run"
            exit 1
          fi
          echo "Connection inputs valid."

      - name: Delete orphan user_devices (e2e-inv-% older than 1 day)
        env:
          STAGING_POOLER_URL: ${{ secrets.STAGING_POOLER_URL }}
        run: |
          set -eu
          # Broad e2e-inv-% pattern is SAFE because it is time-bounded
          # (last_seen_at < now() - interval '1 day'). Any row less than 1 day
          # old belongs to a recently-completed or still-running test job and
          # is left untouched.
          # FK cascade on device_skills is intentional.
          # pg_safeupdate enforced at DB level; WHERE clause is mandatory.
          # STAGING_POOLER_URL is the full transaction-pooler connection string
          # (SMI-4937) -- mirrors device-login-roundtrip-cleanup.yml.
          psql \
            "$STAGING_POOLER_URL" \
            -v ON_ERROR_STOP=1 \
            -P pager=off \
            -c "DELETE FROM user_devices WHERE label LIKE 'e2e-inv-%' AND last_seen_at < now() - interval '1 day';"

      - name: Send alert on failure
        if: failure() && github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s -X POST "$SUPABASE_URL/functions/v1/alert-notify" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "inventory_e2e_cleanup_failed",
              "message": "The weekly cross-harness inventory e2e cleanup workflow failed. Check GitHub Actions for details.",
              "workflow": "Cross-Harness Inventory E2E Cleanup",
              "runId": "${{ github.run_id }}",
              "runUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Alert notification failed (non-fatal)"
