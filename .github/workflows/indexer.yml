# SMI-4852: Tier 2 GHA runner migration. Replaces the curl-against-Edge-Function
# trigger with a Node entrypoint at scripts/indexer/run.ts so wall-clock budget
# is bounded by GHA's 30-min timeout, not the Edge Function's 150s IDLE_TIMEOUT.
#
# Original (SMI-1248) curl-based workflow is preserved up to the "Trigger Indexer"
# step boundary — only the body of that step changes shape. Cron-slot derivation,
# secret validation, result parsing, and failure alerts all carry forward verbatim.
#
# Schedule (Phase 1b):
# - 00:00 UTC = maintenance (stale cleanup, stale_days=7 per SMI-4203)
# - 06:00, 12:00, 18:00 UTC = discovery (new skills, stale_days=30)
#
# Manual triggers:
# - workflow_dispatch (UI / gh workflow run): inputs below
# - repository_dispatch (event_type: indexer-run): from indexer-dispatch edge function

name: Skill Indexer

on:
  schedule:
    - cron: '0 0 * * *' # maintenance (stale cleanup, stale_days=7 per SMI-4203)
    # SMI-4870: discovery split into 3 hourly per-phase sub-slots per 6h cycle so
    # each phase gets a fresh GitHub primary rate-limit bucket (5000/h per-hour).
    - cron: '0 6 * * *' # discovery - Phase 1, cycle 06
    - cron: '0 7 * * *' # discovery - Phase 2, cycle 06
    - cron: '0 8 * * *' # discovery - Phase 3 + finalize, cycle 06
    - cron: '0 12 * * *' # discovery - Phase 1, cycle 12
    - cron: '0 13 * * *' # discovery - Phase 2, cycle 12
    - cron: '0 14 * * *' # discovery - Phase 3 + finalize, cycle 12
    - cron: '0 18 * * *' # discovery - Phase 1, cycle 18
    - cron: '0 19 * * *' # discovery - Phase 2, cycle 18
    - cron: '0 20 * * *' # discovery - Phase 3 + finalize, cycle 18
    - cron: '0 3 * * *' # recheck (SMI-5166) - re-fetch live-but-undiscovered skills by repo_url
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no database writes)'
        required: false
        default: 'false'
        type: boolean
      max_pages:
        description: 'Max pages per topic (5 recommended)'
        required: false
        default: '5'
        type: string
      run_type:
        description: 'Run type: discovery / maintenance / recheck / dequarantine (SMI-5356 FP sweep) / purge (SMI-5357 dead-repo delete)'
        required: false
        default: 'discovery'
        type: choice
        options:
          - discovery
          - maintenance
          - recheck
          - dequarantine
          - purge
      discovery_phase:
        description: 'Discovery phase (SMI-4870): empty = full sequential run; 1/2/3 = single phase'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - '1'
          - '2'
          - '3'
      stale_days:
        description: 'Days before stale quarantine (default: auto based on run_type)'
        required: false
        default: ''
        type: string
      purge_limit:
        description: 'SMI-5357: cap rows deleted per purge apply (empty = no cap; e.g. 100 for a staged first run)'
        required: false
        default: ''
        type: string
      concurrency_kill_switch:
        description: 'Force concurrency=1 (kill-switch); supersedes repo variable INDEXER_CONCURRENCY_KILL_SWITCH'
        required: false
        default: false
        type: boolean
      concurrency:
        description: 'Phase 1 concurrency (default 2; kill-switch forces 1)'
        required: false
        default: '2'
        type: string
      supabase_env:
        description: 'Target Supabase environment'
        required: false
        default: 'prod'
        type: choice
        options:
          - prod
          - staging
  repository_dispatch:
    types: [indexer-run]

env:
  NODE_VERSION: '22'

jobs:
  index:
    name: Index GitHub Skills
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: {}
    concurrency:
      group: skill-indexer
      cancel-in-progress: false

    env:
      # Issue #8: repo-level vars.INDEXER_CONCURRENCY_KILL_SWITCH acts as the
      # default kill-switch source so an operator can engage it remotely without
      # dispatching a new workflow. workflow_dispatch input supersedes the repo
      # variable when explicitly set to true.
      CONCURRENCY_KILL_SWITCH: ${{ (vars.INDEXER_CONCURRENCY_KILL_SWITCH == '1' || github.event.inputs.concurrency_kill_switch == 'true') && '1' || '0' }}

    steps:
      - name: Validate Secrets
        env:
          # Issue #17: select prod vs staging secret pair based on supabase_env input.
          # Schedule + repository_dispatch always use prod.
          SUPABASE_ENV: ${{ github.event.inputs.supabase_env || 'prod' }}
          SUPABASE_URL_PROD: ${{ secrets.SUPABASE_URL_PROD }}
          SUPABASE_URL_STAGING: ${{ secrets.SUPABASE_URL_STAGING }}
          SUPABASE_SERVICE_ROLE_KEY_PROD: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PROD }}
          SUPABASE_SERVICE_ROLE_KEY_STAGING: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_STAGING }}
          # Back-compat: existing single-secret form. Used when *_PROD/_STAGING aren't yet provisioned.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # SMI-1313: Fail fast with clear error if secrets not configured.
          if [ "$SUPABASE_ENV" = "staging" ]; then
            URL_VAL="$SUPABASE_URL_STAGING"
            KEY_VAL="$SUPABASE_SERVICE_ROLE_KEY_STAGING"
          else
            URL_VAL="${SUPABASE_URL_PROD:-$SUPABASE_URL}"
            KEY_VAL="${SUPABASE_SERVICE_ROLE_KEY_PROD:-$SUPABASE_SERVICE_ROLE_KEY}"
          fi
          if [ -z "$URL_VAL" ] || [ -z "$KEY_VAL" ]; then
            echo "::error::Required secrets not configured for env=$SUPABASE_ENV."
            exit 1
          fi
          # Export selected values for later steps.
          echo "SELECTED_SUPABASE_URL=$URL_VAL" >> "$GITHUB_ENV"
          # Mask the key in subsequent step env via a workflow secret reference.
          # We can't echo it raw; use ::add-mask:: then forward via env.
          echo "::add-mask::$KEY_VAL"
          echo "SELECTED_SUPABASE_SERVICE_ROLE_KEY=$KEY_VAL" >> "$GITHUB_ENV"
          echo "Secrets validated for env=$SUPABASE_ENV"

      - name: Determine Run Type
        id: config
        run: |
          # For scheduled runs, determine run type from github.event.schedule.
          # SMI-4374: CRON_SLOT (6/12/18) feeds the discovery topic-rotation selector.
          # SMI-4870: CRON_SLOT is the logical CYCLE (6/12/18), derived from the
          # phase cron rather than the wall-clock hour (e.g. cron 0 7 -> CRON_SLOT 6).
          # DISCOVERY_PHASE (1/2/3) selects a single discovery phase. Both are empty
          # on workflow_dispatch (unless discovery_phase input set) and on maintenance.
          CRON_SLOT=""
          DISCOVERY_PHASE=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 0 * * *")
                RUN_TYPE="maintenance"
                STALE_DAYS="7"
                ;;
              "0 3 * * *")
                RUN_TYPE="recheck"
                STALE_DAYS=""
                ;;
              "0 6 * * *")
                RUN_TYPE="discovery"
                STALE_DAYS="30"
                CRON_SLOT="6"
                DISCOVERY_PHASE="1"
                ;;
              "0 7 * * *")
                RUN_TYPE="discovery"
                STALE_DAYS="30"
                CRON_SLOT="6"
                DISCOVERY_PHASE="2"
                ;;
              "0 8 * * *")
                RUN_TYPE="discovery"
                STALE_DAYS="30"
                CRON_SLOT="6"
                DISCOVERY_PHASE="3"
                ;;
              "0 12 * * *")
                RUN_TYPE="discovery"
                STALE_DAYS="30"
                CRON_SLOT="12"
                DISCOVERY_PHASE="1"
                ;;
              "0 13 * * *")
                RUN_TYPE="discovery"
                STALE_DAYS="30"
                CRON_SLOT="12"
                DISCOVERY_PHASE="2"
                ;;
              "0 14 * * *")
                RUN_TYPE="discovery"
                STALE_DAYS="30"
                CRON_SLOT="12"
                DISCOVERY_PHASE="3"
                ;;
              "0 18 * * *")
                RUN_TYPE="discovery"
                STALE_DAYS="30"
                CRON_SLOT="18"
                DISCOVERY_PHASE="1"
                ;;
              "0 19 * * *")
                RUN_TYPE="discovery"
                STALE_DAYS="30"
                CRON_SLOT="18"
                DISCOVERY_PHASE="2"
                ;;
              "0 20 * * *")
                RUN_TYPE="discovery"
                STALE_DAYS="30"
                CRON_SLOT="18"
                DISCOVERY_PHASE="3"
                ;;
              *)
                RUN_TYPE="discovery"
                STALE_DAYS="30"
                ;;
            esac
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # indexer-dispatch edge function forwards inputs via client_payload.
            RUN_TYPE="${{ github.event.client_payload.run_type || 'discovery' }}"
            # SMI-5356 (M-1): dequarantine flips the live `quarantined` column, so it
            # is workflow_dispatch-only. The automated indexer-dispatch path must
            # never be able to trigger an apply. Reject it here, before any work.
            # SMI-5357: purge is permanently destructive (DELETE); same guard.
            if [ "$RUN_TYPE" = "dequarantine" ] || [ "$RUN_TYPE" = "purge" ]; then
              echo "::error::dequarantine and purge run_types are workflow_dispatch-only; refusing repository_dispatch trigger."
              exit 1
            fi
            STALE_DAYS="${{ github.event.client_payload.stale_days || '30' }}"
            CRON_SLOT="${{ github.event.client_payload.cron_slot || '' }}"
            DISCOVERY_PHASE="${{ github.event.client_payload.discovery_phase || '' }}"
          else
            RUN_TYPE="${{ github.event.inputs.run_type || 'discovery' }}"
            STALE_DAYS="${{ github.event.inputs.stale_days }}"
            # SMI-4870: empty discovery_phase input = full sequential discovery run.
            DISCOVERY_PHASE="${{ github.event.inputs.discovery_phase || '' }}"
            if [ -z "$STALE_DAYS" ]; then
              if [ "$RUN_TYPE" = "maintenance" ]; then
                STALE_DAYS="7"
              elif [ "$RUN_TYPE" = "recheck" ]; then
                STALE_DAYS=""
              elif [ "$RUN_TYPE" = "dequarantine" ]; then
                # SMI-5356 (M-2): no stale window. Leave empty so parse-env uses
                # its 0 sentinel (the branch never reads STALE_DAYS anyway).
                STALE_DAYS=""
              elif [ "$RUN_TYPE" = "purge" ]; then
                # SMI-5357: same - purge has no stale window.
                STALE_DAYS=""
              else
                STALE_DAYS="30"
              fi
            fi
          fi
          echo "run_type=$RUN_TYPE" >> "$GITHUB_OUTPUT"
          echo "stale_days=$STALE_DAYS" >> "$GITHUB_OUTPUT"
          echo "cron_slot=$CRON_SLOT" >> "$GITHUB_OUTPUT"
          echo "discovery_phase=$DISCOVERY_PHASE" >> "$GITHUB_OUTPUT"
          echo "Run type: $RUN_TYPE, Stale days: $STALE_DAYS, Cron slot: ${CRON_SLOT:-<none>}, Discovery phase: ${DISCOVERY_PHASE:-<none>}"

      - name: Checkout
        # SHA-pinned per audit-workflow-sha-pin (Check 42 / SMI-4758). Tag = v6.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Setup Node
        # SHA-pinned per audit-workflow-sha-pin (Check 42 / SMI-4758). Tag = v6.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run indexer
        id: indexer
        env:
          SUPABASE_URL: ${{ env.SELECTED_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SELECTED_SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_APP_ID: ${{ secrets.SKILLSMITH_GITHUB_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.SKILLSMITH_GITHUB_APP_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.SKILLSMITH_GITHUB_APP_PRIVATE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || github.event.client_payload.dry_run || 'false' }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || github.event.client_payload.max_pages || '5' }}
          MAX_REPOS: ${{ github.event.client_payload.max_repos || '100' }}
          CODE_SEARCH_MAX_PAGES: ${{ github.event.client_payload.code_search_max_pages || '1' }}
          RUN_TYPE: ${{ steps.config.outputs.run_type }}
          STALE_DAYS: ${{ steps.config.outputs.stale_days }}
          CRON_SLOT: ${{ steps.config.outputs.cron_slot }}
          # SMI-4870: empty = full sequential discovery; 1/2/3 = single phase.
          DISCOVERY_PHASE: ${{ steps.config.outputs.discovery_phase }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '2' }}
          # CONCURRENCY_KILL_SWITCH inherited from the job-level env (kill-switch sources).
          # SMI-5166 recheck vars - sourced from optional repo variables with safe defaults.
          # RECHECK_DRY_RUN is intentionally independent of the workflow DRY_RUN input.
          # On a scheduled cron there are no inputs, so DRY_RUN resolves to 'false' (live).
          # RECHECK_DRY_RUN defaults to 'true' as an enforceable dry-run-first gate;
          # flip to 'false' in the repo var only after observing 2-3 dry-run nights.
          RECHECK_THRESHOLD_DAYS: ${{ vars.RECHECK_THRESHOLD_DAYS || '5' }}
          RECHECK_MAX_CANDIDATES: ${{ vars.RECHECK_MAX_CANDIDATES || '2000' }}
          RECHECK_BATCH: ${{ vars.RECHECK_BATCH || '5' }}
          RECHECK_DRY_RUN: ${{ vars.RECHECK_DRY_RUN || 'true' }}
          # SMI-5356: dequarantine-sweep dry-run gate, independent of the workflow
          # dry_run input (mirrors RECHECK_DRY_RUN). Defaults 'true' so a dispatch
          # is read-only unless the repo var is deliberately flipped to 'false' for
          # an apply run, then set back to 'true'. apply = !DEQUARANTINE_DRY_RUN.
          DEQUARANTINE_DRY_RUN: ${{ vars.DEQUARANTINE_DRY_RUN || 'true' }}
          # SMI-5357: purge dry-run gate (same fail-safe pattern as above).
          # Defaults 'true' - permanently destructive; flip repo var to 'false'
          # only for the single apply run, then immediately restore to 'true'.
          PURGE_DRY_RUN: ${{ vars.PURGE_DRY_RUN || 'true' }}
          # SMI-5357: optional per-apply row cap (workflow input; empty on
          # schedule/repository_dispatch => no cap). Staged first prod apply.
          PURGE_LIMIT: ${{ inputs.purge_limit }}
        run: |
          # Issue #1: npx tsx (not node --experimental-strip-types).
          # The entrypoint emits one JSON line on success; capture for downstream steps.
          # SMI-4852 follow-up: pipefail so tsx failure propagates through `| tee`.
          set -eo pipefail
          OUTPUT_FILE="$(mktemp)"
          if npx tsx scripts/indexer/run.ts | tee "$OUTPUT_FILE"; then
            HTTP_CODE=200
          else
            HTTP_CODE=500
          fi
          RESPONSE=$(tail -n1 "$OUTPUT_FILE" || echo '{}')
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          # GH_OUTPUT requires single-line; pass JSON as-is (no newlines from JSON.stringify).
          echo "response=$RESPONSE" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" -ne 200 ]; then
            exit 1
          fi

      - name: Parse Results
        if: success()
        env:
          RESPONSE: ${{ steps.indexer.outputs.response }}
          RUN_TYPE: ${{ steps.config.outputs.run_type }}
        run: |
          # Node entrypoint emits { data: {...}, meta: {...} } where data is the
          # IndexerResult shape (or null on early-skip).
          FOUND=$(printf '%s' "$RESPONSE" | jq -r '.data.found // 0')
          INDEXED=$(printf '%s' "$RESPONSE" | jq -r '.data.indexed // 0')
          FAILED=$(printf '%s' "$RESPONSE" | jq -r '.data.failed // 0')
          STALE=$(printf '%s' "$RESPONSE" | jq -r '.data.stale // 0')
          UNCHANGED=$(printf '%s' "$RESPONSE" | jq -r '.data.unchanged // 0')
          CODE_SEARCH=$(printf '%s' "$RESPONSE" | jq -r '.data.code_search.repos_found // 0')
          DRY_RUN=$(printf '%s' "$RESPONSE" | jq -r '.data.dry_run // .data.dryRun // false')
          RRL=$(printf '%s' "$RESPONSE" | jq -r '.meta.rate_limit_remaining_min // 0')
          SEC=$(printf '%s' "$RESPONSE" | jq -r '.meta.secondary_rate_limit_hits // 0')
          CONC=$(printf '%s' "$RESPONSE" | jq -r '.meta.concurrency // 0')
          KILL=$(printf '%s' "$RESPONSE" | jq -r '.meta.kill_switch_engaged // false')

          {
            echo "### Indexer Results ($RUN_TYPE)"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Found | $FOUND |"
            echo "| Indexed (new) | $INDEXED |"
            echo "| Unchanged | $UNCHANGED |"
            echo "| Stale Quarantined | $STALE |"
            echo "| Code Search Repos | $CODE_SEARCH |"
            echo "| Failed | $FAILED |"
            echo "| Dry Run | $DRY_RUN |"
            echo "| Rate-limit remaining (min) | $RRL |"
            echo "| Secondary rate-limit hits | $SEC |"
            echo "| Concurrency | $CONC |"
            echo "| Kill switch engaged | $KILL |"
          } >> "$GITHUB_STEP_SUMMARY"

          # SMI-5166: recheck-specific counters from data.recheck sub-object.
          if [ "$RUN_TYPE" = "recheck" ]; then
            RC_CANDIDATES=$(printf '%s' "$RESPONSE" | jq -r '.data.recheck.candidate_count // 0')
            RC_LIVE_TOUCHED=$(printf '%s' "$RESPONSE" | jq -r '.data.recheck.live_touched // 0')
            RC_CLEARED=$(printf '%s' "$RESPONSE" | jq -r '.data.recheck.cleared // 0')
            RC_REPO_GONE=$(printf '%s' "$RESPONSE" | jq -r '.data.recheck.repo_gone // 0')
            RC_CAS_SKIPPED=$(printf '%s' "$RESPONSE" | jq -r '.data.recheck.cas_skipped // 0')
            RC_CAP_SATURATED=$(printf '%s' "$RESPONSE" | jq -r '.data.recheck.cap_saturated // false')
            RC_FETCH_ERR=$(printf '%s' "$RESPONSE" | jq -r '.data.recheck.fetch_error_rate // 0')
            {
              echo ""
              echo "#### Recheck Detail (SMI-5166)"
              echo ""
              echo "| Recheck Metric | Value |"
              echo "|----------------|-------|"
              echo "| Candidates | $RC_CANDIDATES |"
              echo "| Live Touched (re-fetched live) | $RC_LIVE_TOUCHED |"
              echo "| Cleared (self-heal) | $RC_CLEARED |"
              echo "| Repo Gone | $RC_REPO_GONE |"
              echo "| CAS Skipped (row state changed mid-run) | $RC_CAS_SKIPPED |"
              echo "| Cap Saturated | $RC_CAP_SATURATED |"
              echo "| Fetch Error Rate | $RC_FETCH_ERR |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          # SMI-5356: dequarantine-sweep counters from data.dequarantine sub-object.
          # The generic table above reads the IndexerResult fields (all 0 here); the
          # real numbers live under data.dequarantine (SweepCounts).
          if [ "$RUN_TYPE" = "dequarantine" ]; then
            DQ_TOTAL=$(printf '%s' "$RESPONSE" | jq -r '.data.dequarantine.total // 0')
            DQ_CLEARED=$(printf '%s' "$RESPONSE" | jq -r '.data.dequarantine.cleared // 0')
            DQ_KEPT=$(printf '%s' "$RESPONSE" | jq -r '.data.dequarantine.kept // 0')
            DQ_REPO_GONE=$(printf '%s' "$RESPONSE" | jq -r '.data.dequarantine.repoGone // 0')
            DQ_FETCH_FAILED=$(printf '%s' "$RESPONSE" | jq -r '.data.dequarantine.fetchFailed // 0')
            DQ_PARSE_FAILED=$(printf '%s' "$RESPONSE" | jq -r '.data.dequarantine.parseFailed // 0')
            DQ_CAS_SKIPPED=$(printf '%s' "$RESPONSE" | jq -r '.data.dequarantine.casSkipped // 0')
            DQ_ERRORS=$(printf '%s' "$RESPONSE" | jq -r '.data.dequarantine.errors // 0')
            DQ_DRY_RUN=$(printf '%s' "$RESPONSE" | jq -r '.data.dryRun // true')
            {
              echo ""
              echo "#### Dequarantine Sweep Detail (SMI-5356)"
              echo ""
              echo "| Dequarantine Metric | Value |"
              echo "|---------------------|-------|"
              echo "| Total candidates | $DQ_TOTAL |"
              echo "| Cleared (would-clear when dry-run) | $DQ_CLEARED |"
              echo "| Kept (still >=40) | $DQ_KEPT |"
              echo "| Repo Gone (re-tagged for purge) | $DQ_REPO_GONE |"
              echo "| Fetch Failed (transient/rate-limit) | $DQ_FETCH_FAILED |"
              echo "| Parse Failed | $DQ_PARSE_FAILED |"
              echo "| CAS Skipped (row changed mid-run) | $DQ_CAS_SKIPPED |"
              echo "| Errors | $DQ_ERRORS |"
              echo "| Dry Run | $DQ_DRY_RUN |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          # SMI-5357: purge-dead-quarantines counters from data.purge sub-object.
          # The generic table above reads the IndexerResult fields (all 0 here); the
          # real numbers live under data.purge (PurgeCounts).
          if [ "$RUN_TYPE" = "purge" ]; then
            PURGE_TOTAL=$(printf '%s' "$RESPONSE" | jq -r '.data.purge.total // 0')
            PURGE_DELETED=$(printf '%s' "$RESPONSE" | jq -r '.data.purge.deleted // 0')
            PURGE_APPROVALS=$(printf '%s' "$RESPONSE" | jq -r '.data.purge.approvalsDeleted // 0')
            PURGE_NO_REPO=$(printf '%s' "$RESPONSE" | jq -r '.data.purge.byCohort["no-repo-url"] // 0')
            PURGE_REPO=$(printf '%s' "$RESPONSE" | jq -r '.data.purge.byCohort.repository // 0')
            PURGE_DRY=$(printf '%s' "$RESPONSE" | jq -r '.data.dryRun // true')
            {
              echo ""
              echo "#### Purge Dead Quarantines Detail (SMI-5357)"
              echo ""
              echo "| Purge Metric | Value |"
              echo "|--------------|-------|"
              echo "| Total (dead set selected) | $PURGE_TOTAL |"
              echo "| Skills Deleted | $PURGE_DELETED |"
              echo "| Approvals Deleted | $PURGE_APPROVALS |"
              echo "| No-repo-url cohort | $PURGE_NO_REPO |"
              echo "| Repository* cohort | $PURGE_REPO |"
              echo "| Dry Run | $PURGE_DRY |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Report Failure
        if: failure()
        env:
          HTTP_CODE: ${{ steps.indexer.outputs.http_code }}
          RESPONSE: ${{ steps.indexer.outputs.response }}
        run: |
          TRUNCATED=$(printf '%s' "$RESPONSE" | head -c 4096)
          {
            echo "### Indexer Failed"
            echo ""
            echo "HTTP Code: ${HTTP_CODE}"
            echo ""
            echo "Response:"
            echo '```'
            printf '%s' "$TRUNCATED"
            echo ""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send Alert on Failure
        if: failure()
        env:
          HTTP_CODE: ${{ steps.indexer.outputs.http_code }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUPABASE_URL: ${{ env.SELECTED_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SELECTED_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          BODY=$(jq -n \
            --arg msg "The skill indexer workflow failed. HTTP Code: $HTTP_CODE" \
            --arg rid "$RUN_ID" \
            --arg url "$RUN_URL" \
            '{type:"indexer_failed", message:$msg, workflow:"Skill Indexer", runId:$rid, runUrl:$url}')
          curl -s -X POST \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$SUPABASE_URL/functions/v1/alert-notify" || true
