# SMI-1248: GitHub Actions workflow for scheduled skill indexing
# Alternative to pg_cron for triggering the indexer
#
# Performance Notes (SMI-1413):
# - Edge Function has 150-second timeout
# - max_pages=5 indexes ~400 skills reliably (~1 min)
# - max_pages=7+ causes timeout (502 Bad Gateway)
# - Uses GitHub App auth for 5000 req/hour rate limit
#
# Phase 1b: 4x daily runs with advisory lock
# - 00:00 UTC = maintenance (stale cleanup, stale_days=7 per SMI-4203)
# - 06:00, 12:00, 18:00 UTC = discovery (new skills, stale_days=30)

name: Skill Indexer

on:
  schedule:
    # Phase 1b: Run 4x daily — split into separate entries so
    # github.event.schedule can distinguish which cron triggered the run.
    # (SMI-3351: combined cron + date check broke due to GitHub Actions delay)
    - cron: '0 0 * * *' # maintenance (stale cleanup, stale_days=7 per SMI-4203)
    - cron: '0 6 * * *' # discovery
    - cron: '0 12 * * *' # discovery
    - cron: '0 18 * * *' # discovery
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no database writes)'
        required: false
        default: 'false'
        type: boolean
      max_pages:
        description: 'Max pages per topic (5 recommended, 7+ causes timeout)'
        required: false
        default: '5'
        type: string
      run_type:
        description: 'Run type: maintenance (stale cleanup) or discovery (new skills)'
        required: false
        default: 'discovery'
        type: choice
        options:
          - discovery
          - maintenance
      stale_days:
        description: 'Days before stale quarantine (default: auto based on run_type)'
        required: false
        default: ''
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  index:
    name: Index GitHub Skills
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: {}
    concurrency:
      group: skill-indexer
      cancel-in-progress: false

    steps:
      - name: Validate Secrets
        run: |
          # SMI-1313: Fail fast with clear error if secrets not configured
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Required secrets not configured. Add SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY to repository secrets."
            echo "See: https://github.com/wrsmith108/skillsmith/settings/secrets/actions"
            exit 1
          fi
          echo "Secrets validated"

      - name: Determine Run Type
        id: config
        run: |
          # For scheduled runs, determine run type from github.event.schedule
          # (deterministic — matches the cron expression, not the wall clock)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
              RUN_TYPE="maintenance"
              STALE_DAYS="7"
            else
              RUN_TYPE="discovery"
              STALE_DAYS="30"
            fi
          else
            # Manual dispatch uses inputs
            RUN_TYPE="${{ github.event.inputs.run_type || 'discovery' }}"
            STALE_DAYS="${{ github.event.inputs.stale_days }}"
            if [ -z "$STALE_DAYS" ]; then
              if [ "$RUN_TYPE" = "maintenance" ]; then
                STALE_DAYS="7"
              else
                STALE_DAYS="30"
              fi
            fi
          fi
          echo "run_type=$RUN_TYPE" >> $GITHUB_OUTPUT
          echo "stale_days=$STALE_DAYS" >> $GITHUB_OUTPUT
          echo "Run type: $RUN_TYPE, Stale days: $STALE_DAYS"

      - name: Trigger Indexer
        id: indexer
        run: |
          # Build request body
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '5' }}"
          RUN_TYPE="${{ steps.config.outputs.run_type }}"
          STALE_DAYS="${{ steps.config.outputs.stale_days }}"

          # SMI-4241: $STALE_DAYS MUST remain unquoted below so JSON renders
          # as numeric (edge function requires typeof === 'number' on the
          # discovery branch; maintenance defaults to 7 if missing, but
          # quoting would still be a silent observability regression).
          BODY=$(cat <<EOF
          {
            "maxPages": $MAX_PAGES,
            "dryRun": $DRY_RUN,
            "runType": "$RUN_TYPE",
            "staleThresholdDays": $STALE_DAYS
          }
          EOF
          )

          echo "Triggering indexer with: $BODY"

          # Call the Edge Function
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$SUPABASE_URL/functions/v1/indexer")

          # Extract status code and body
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response code: $HTTP_CODE"
          echo "Response body: $BODY"

          # Set outputs
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "response=$BODY" >> $GITHUB_OUTPUT

          # Check for success (200 = normal, skipped runs from advisory lock are OK)
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Indexer failed with status $HTTP_CODE"
            exit 1
          fi

          # Check if run was skipped due to concurrent execution
          SKIPPED=$(echo "$BODY" | jq -r '.data.skipped // false')
          if [ "$SKIPPED" = "true" ]; then
            echo "::notice::Run skipped - concurrent indexer already in progress"
          fi

      - name: Parse Results
        if: success()
        env:
          # SMI-4241: pass via env so bash never sees the response body as
          # inline source. jq is the only consumer of $RESPONSE below.
          RESPONSE: ${{ steps.indexer.outputs.response }}
          RUN_TYPE: ${{ steps.config.outputs.run_type }}
        run: |
          FOUND=$(printf '%s' "$RESPONSE" | jq -r '.data.found // 0')
          INDEXED=$(printf '%s' "$RESPONSE" | jq -r '.data.indexed // 0')
          FAILED=$(printf '%s' "$RESPONSE" | jq -r '.data.failed // 0')
          STALE=$(printf '%s' "$RESPONSE" | jq -r '.data.stale // 0')
          UNCHANGED=$(printf '%s' "$RESPONSE" | jq -r '.data.unchanged // 0')
          CODE_SEARCH=$(printf '%s' "$RESPONSE" | jq -r '.data.code_search.repos_found // 0')
          DRY_RUN=$(printf '%s' "$RESPONSE" | jq -r '.data.dryRun // false')

          {
            echo "### Indexer Results ($RUN_TYPE)"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Found | $FOUND |"
            echo "| Indexed (new) | $INDEXED |"
            echo "| Unchanged | $UNCHANGED |"
            echo "| Stale Quarantined | $STALE |"
            echo "| Code Search Repos | $CODE_SEARCH |"
            echo "| Failed | $FAILED |"
            echo "| Dry Run | $DRY_RUN |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report Failure
        if: failure()
        env:
          # SMI-4241: response body via env so parens/quotes/backticks in
          # the payload can never crash bash. Truncate at 4 KB so the step
          # summary stays readable; full body is still in the workflow log.
          HTTP_CODE: ${{ steps.indexer.outputs.http_code }}
          RESPONSE: ${{ steps.indexer.outputs.response }}
        run: |
          TRUNCATED=$(printf '%s' "$RESPONSE" | head -c 4096)
          SUFFIX=""
          if [ "${#RESPONSE}" -gt 4096 ]; then
            SUFFIX=$'\n… (truncated, see workflow logs for full body)'
          fi
          {
            echo "### Indexer Failed"
            echo ""
            echo "HTTP Code: ${HTTP_CODE}"
            echo ""
            echo "Response:"
            echo '```'
            printf '%s' "$TRUNCATED"
            printf '%s' "$SUFFIX"
            echo ""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send Alert on Failure
        if: failure()
        env:
          # SMI-4241: env + jq -n prevents future injection via run metadata.
          HTTP_CODE: ${{ steps.indexer.outputs.http_code }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY=$(jq -n \
            --arg msg "The skill indexer workflow failed. HTTP Code: $HTTP_CODE" \
            --arg rid "$RUN_ID" \
            --arg url "$RUN_URL" \
            '{type:"indexer_failed", message:$msg, workflow:"Skill Indexer", runId:$rid, runUrl:$url}')
          curl -s -X POST \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$SUPABASE_URL/functions/v1/alert-notify" || true
