name: E2E Tests

on:
  push:
    branches: [e2e-testing, main]
  pull_request:
    branches: [e2e-testing, main]
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - cli
          - mcp

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  SKILLSMITH_E2E: 'true'
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

# SMI-1256: Permissions required for PR comments
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # SMI-969: Build Docker image once, extract dependencies, use for all jobs
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files before Docker build
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key
          echo "✓ git-crypt unlocked successfully"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: skillsmith-e2e
          tags: |
            type=sha,prefix=

      # Cache write: main only (SMI-3653)
      # PR branches read from main's cache via cache-from but don't write blobs.
      # See docs/internal/implementation/ci-cache-pressure-fix.md
      - name: Set BuildKit cache-to
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "CACHE_TO=type=gha,mode=min,scope=e2e" >> $GITHUB_ENV
          fi

      - name: Build and cache Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: false
          load: true
          tags: skillsmith-e2e:${{ github.sha }}
          cache-from: type=gha,scope=e2e
          cache-to: ${{ env.CACHE_TO }}
          target: dev

      # SMI-2240: Save image with current SHA tag for downstream jobs
      # SMI-4646: zstd -T0 -3 (parallel, level 3) is ~3x faster than gzip with similar ratio
      - name: Save Docker image
        run: |
          docker save skillsmith-e2e:${{ github.sha }} | zstd -T0 -3 > /tmp/skillsmith-e2e.tar.zst
          echo "✓ Saved image with tag: ${{ github.sha }}"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-image-e2e
          path: /tmp/skillsmith-e2e.tar.zst
          retention-days: 1

      # SMI-969 + SMI-4646: Single extract-all container replaces extract-deps split.
      # SMI-2159: Also extract nested workspace node_modules (for non-hoisted deps like @aws-sdk)
      - name: Extract node_modules from Docker image
        run: |
          docker rm -f extract-all 2>/dev/null || true

          # Create a single container (not running) and copy out node_modules
          docker create --name extract-all skillsmith-e2e:${{ github.sha }}

          # Copy root node_modules
          docker cp extract-all:/app/node_modules /tmp/node_modules

          # Copy nested workspace node_modules (for non-hoisted dependencies)
          for pkg in core mcp-server cli enterprise vscode-extension website doc-retrieval-mcp; do
            mkdir -p /tmp/packages/$pkg
            if docker cp extract-all:/app/packages/$pkg/node_modules /tmp/packages/$pkg/ 2>/dev/null; then
              echo "✓ Copied packages/$pkg/node_modules"
              ls /tmp/packages/$pkg/node_modules/ 2>/dev/null | head -5 || true
            else
              echo "- No node_modules in packages/$pkg (hoisted or doesn't exist)"
            fi
          done

          docker rm extract-all

          # SMI-4646: zstd -T0 -1 (parallel, fastest level) is ~3-4x faster than gzip with similar ratio
          tar -cf - -C /tmp node_modules packages | zstd -T0 -1 > /tmp/node_modules.tar.zst

          echo "=== Tar contents (packages only) ==="
          zstd -d --stdout /tmp/node_modules.tar.zst | tar -tf - | grep "^packages/" | head -20

      - name: Upload node_modules artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: node-modules-e2e
          path: /tmp/node_modules.tar.zst
          retention-days: 1
          compression-level: 1 # Content already zstd-compressed
  # Phase A: CLI E2E Tests
  # SMI-969: Uses pre-built Docker image and node_modules from docker-build job
  cli-e2e-tests:
    name: CLI E2E Tests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event.inputs.test_scope != 'mcp'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image-e2e
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-modules-e2e
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected
      - name: Load Docker image
        run: |
          zstd -d --stdout /tmp/skillsmith-e2e.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-e2e --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-e2e --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-e2e:$LOADED_TAG skillsmith-e2e:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      - name: Extract node_modules
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Build packages in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-e2e:${{ github.sha }} \
            npm run build

      - name: Run CLI E2E tests in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e SKILLSMITH_E2E=true \
            skillsmith-e2e:${{ github.sha }} \
            npm run test:e2e:cli

      - name: Upload CLI test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cli-e2e-results
          path: |
            test-results/cli-*.xml
            test-results/cli-*.json
          retention-days: 7

  # Phase B: MCP E2E Tests (only runs after CLI passes)
  # SMI-969: Uses pre-built Docker image and node_modules from docker-build job
  mcp-e2e-tests:
    name: MCP E2E Tests
    runs-on: ubuntu-latest
    needs: [docker-build, cli-e2e-tests]
    if: |
      always() &&
      (needs.cli-e2e-tests.result == 'success' || github.event.inputs.test_scope == 'mcp')

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image-e2e
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-modules-e2e
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected
      - name: Load Docker image
        run: |
          zstd -d --stdout /tmp/skillsmith-e2e.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-e2e --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-e2e --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-e2e:$LOADED_TAG skillsmith-e2e:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      - name: Extract node_modules
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Build packages in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-e2e:${{ github.sha }} \
            npm run build

      - name: Run MCP E2E tests in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e SKILLSMITH_E2E=true \
            skillsmith-e2e:${{ github.sha }} \
            npm run test:e2e:mcp

      - name: Upload MCP test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp-e2e-results
          path: |
            test-results/mcp-*.xml
            test-results/mcp-*.json
          retention-days: 7

  # Generate reports and create Linear issues for failures
  # SMI-969: Uses pre-built Docker image and node_modules from docker-build job
  report-results:
    name: Generate Reports
    runs-on: ubuntu-latest
    needs: [docker-build, cli-e2e-tests, mcp-e2e-tests]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image-e2e
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-modules-e2e
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected
      - name: Load Docker image
        run: |
          zstd -d --stdout /tmp/skillsmith-e2e.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-e2e --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-e2e --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-e2e:$LOADED_TAG skillsmith-e2e:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      - name: Extract node_modules
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Download CLI results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: cli-e2e-results
          path: test-results/cli
        continue-on-error: true # audit:allow-continue-on-error — test artifacts may not exist

      - name: Download MCP results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: mcp-e2e-results
          path: test-results/mcp
        continue-on-error: true # audit:allow-continue-on-error — test artifacts may not exist

      - name: Generate combined report in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-e2e:${{ github.sha }} \
            npm run test:e2e:report
        continue-on-error: true # audit:allow-continue-on-error — best-effort reporting

      - name: Create Linear issues for failures in Docker
        if: failure()
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e LINEAR_API_KEY=${{ secrets.LINEAR_API_KEY }} \
            skillsmith-e2e:${{ github.sha }} \
            npm run test:e2e:create-issues
        continue-on-error: true # audit:allow-continue-on-error — best-effort issue creation

      - name: Upload combined reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-combined-reports
          path: |
            test-results/combined-*.json
            docs/testing/results/*.md
          retention-days: 7

      - name: Post summary to PR
        if: github.event_name == 'pull_request'
        continue-on-error: true # audit:allow-continue-on-error — SMI-1256: Don't fail workflow if comment posting fails
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = 'docs/testing/results/latest-summary.md';

            let summary = '## E2E Test Results\n\n';

            if (fs.existsSync(path)) {
              summary += fs.readFileSync(path, 'utf-8');
            } else {
              const cliStatus = '${{ needs.cli-e2e-tests.result }}';
              const mcpStatus = '${{ needs.mcp-e2e-tests.result }}';

              summary += `| Phase | Status |\n|-------|--------|\n`;
              summary += `| CLI E2E | ${cliStatus === 'success' ? '✅' : '❌'} ${cliStatus} |\n`;
              summary += `| MCP E2E | ${mcpStatus === 'success' ? '✅' : '❌'} ${mcpStatus} |\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # Baseline collection job (only on main branch)
  # SMI-969: Uses pre-built Docker image and node_modules from docker-build job
  collect-baselines:
    name: Collect Performance Baselines
    runs-on: ubuntu-latest
    needs: [docker-build, cli-e2e-tests, mcp-e2e-tests]
    if: github.ref == 'refs/heads/main' && needs.cli-e2e-tests.result == 'success' && needs.mcp-e2e-tests.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # SMI-2159: Decrypt git-crypt encrypted files
      - name: Unlock git-crypt
        if: ${{ env.GIT_CRYPT_KEY != '' }}
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          # SMI-4646: skip apt-get when git-crypt is already installed (saves ~3-5s/job on cache-hit runners)
          if ! command -v git-crypt &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-crypt
          fi
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm -f /tmp/git-crypt-key

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image-e2e
          path: /tmp

      - name: Download node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-modules-e2e
          path: /tmp

      # SMI-2240: Re-tag if loaded tag differs from expected
      - name: Load Docker image
        run: |
          zstd -d --stdout /tmp/skillsmith-e2e.tar.zst | docker load
          # LOADED_TAG will be empty if no images exist (handled by -n check below)
          LOADED_TAG=$(docker images skillsmith-e2e --format '{{.Tag}}' | head -1)
          if [ -n "$LOADED_TAG" ] && [ "$LOADED_TAG" != "${{ github.sha }}" ]; then
            echo "Re-tagging: $LOADED_TAG -> ${{ github.sha }}"
            docker images skillsmith-e2e --format 'table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' || true
            if ! docker tag skillsmith-e2e:$LOADED_TAG skillsmith-e2e:${{ github.sha }}; then
              echo "::error::Failed to re-tag Docker image"
              exit 1
            fi
          fi

      - name: Extract node_modules
        run: zstd -d --stdout /tmp/node_modules.tar.zst | tar -xf - -C ${{ github.workspace }}

      - name: Download all results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: test-results/all

      - name: Generate baseline report in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            skillsmith-e2e:${{ github.sha }} \
            npm run test:e2e:baseline

      - name: Upload baseline report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: performance-baselines
          path: test-results/combined-report.json
          retention-days: 7

      - name: Create Linear issue for baselines
        run: |
          echo "Performance baselines collected. See artifact for details."
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
